<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卯时AI · 情报知识图谱</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/dist/vis-network.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        :root {
            --primary: #1A237E;
            --accent: #FF6B35;
            --neutral: #E6B85C;
            --highlight: #00E5FF;
            --qian1: #0A1F3B;
            --qian2: #1A365D;
            --qian3: #2A4D7F;
            --qian4: #3A64A1;
            --qian5: #4A7BC3;
            --qian6: #5A92E5;
            --text: #E2E8F0;
            --text2: #94A3B8;
            --text3: #64748B;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--qian1);
            color: var(--text);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        #header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 50px;
            background: rgba(10, 31, 59, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--qian3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }
        #header h1 {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo {
            width: 26px; height: 26px;
            background: linear-gradient(135deg, var(--accent), #E85D2E);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 11px;
            color: white;
        }
        #header-stats {
            font-size: 12px;
            color: var(--text2);
            display: flex;
            gap: 16px;
        }
        #main {
            display: flex;
            height: 100vh;
            padding-top: 50px;
        }
        #sidebar {
            width: 280px;
            background: rgba(10, 31, 59, 0.97);
            border-right: 1px solid var(--qian3);
            padding: 14px;
            overflow-y: auto;
            flex-shrink: 0;
            z-index: 50;
        }
        .section { margin-bottom: 16px; }
        .section-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text3);
            margin-bottom: 8px;
            font-weight: 700;
        }
        #search-box {
            width: 100%;
            padding: 8px 12px;
            background: var(--qian2);
            border: 1px solid var(--qian3);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            outline: none;
        }
        #search-box:focus { border-color: var(--accent); }
        #search-box::placeholder { color: var(--text3); }
        .search-status {
            font-size: 11px;
            color: var(--text3);
            margin-top: 4px;
            min-height: 16px;
        }
        .search-status .match-count { color: var(--accent); font-weight: 600; }
        .today-section {
            background: linear-gradient(135deg, rgba(255,107,53,0.15), rgba(255,107,53,0.05));
            border: 1px solid rgba(255,107,53,0.3);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .today-section.empty {
            background: var(--qian2);
            border-color: var(--qian3);
        }
        .today-section h3 {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .today-section.empty h3 { color: var(--text3); }
        .today-item {
            padding: 8px 10px;
            background: rgba(10,31,59,0.5);
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.15s;
            border-left: 3px solid transparent;
        }
        .today-item:hover {
            background: var(--qian2);
            border-left-color: var(--accent);
        }
        .today-item .ti-title {
            font-size: 12px;
            font-weight: 500;
            color: var(--text);
            line-height: 1.4;
            margin-bottom: 3px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .today-item .ti-meta {
            font-size: 10px;
            color: var(--text3);
            display: flex;
            gap: 8px;
        }
        .today-item .ti-badge {
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 3px;
            font-weight: 600;
        }
        .ti-badge.important { background: var(--qian5); color: white; }
        .ti-badge.major { background: var(--neutral); color: var(--qian1); }
        .today-empty {
            font-size: 11px;
            color: var(--text3);
            text-align: center;
            padding: 8px 0;
        }
        .today-summary-text {
            font-size: 11px;
            color: var(--text2);
            line-height: 1.6;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,107,53,0.15);
        }
        .cat-item {
            border-radius: 8px;
            margin-bottom: 4px;
            overflow: hidden;
        }
        .cat-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 8px;
        }
        .cat-header:hover { background: var(--qian2); }
        .cat-header.inactive { opacity: 0.35; }
        .cat-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .cat-name { flex: 1; font-size: 13px; }
        .cat-count { font-size: 11px; color: var(--text3); }
        .cat-toggle { font-size: 11px; color: var(--text3); transition: transform 0.2s; }
        .cat-toggle.open { transform: rotate(90deg); }
        .tag-list {
            padding-left: 32px;
            padding-bottom: 6px;
            display: none;
        }
        .tag-list.open { display: block; }
        .tag-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text2);
            transition: all 0.15s;
            border-left: 3px solid transparent;
        }
        .tag-item:hover { background: var(--qian2); color: var(--text); }
        .tag-item.selected {
            background: rgba(0, 229, 255, 0.12);
            color: var(--highlight);
            font-weight: 600;
            border-left-color: var(--highlight);
        }
        .tag-item .tag-dot { width: 6px; height: 6px; border-radius: 50%; }
        .tag-item .tag-label { flex: 1; }
        .tag-item .tag-num { font-size: 10px; color: var(--text3); }
        .btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--qian3);
            background: var(--qian2);
            color: var(--text);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 6px;
        }
        .btn:hover { background: var(--qian3); }
        .btn.active { background: var(--accent); border-color: var(--accent); color: white; }
        .hint {
            font-size: 11px;
            color: var(--text3);
            line-height: 1.5;
            margin-top: 6px;
        }
        #graph-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: radial-gradient(ellipse at center, var(--qian2) 0%, var(--qian1) 100%);
        }
        #detail-panel {
            position: fixed;
            right: 16px;
            top: 66px;
            width: 400px;
            max-height: calc(100vh - 86px);
            background: rgba(10, 31, 59, 0.98);
            border: 1px solid var(--qian3);
            border-radius: 12px;
            padding: 20px;
            display: none;
            overflow-y: auto;
            z-index: 150;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        #detail-panel.visible { display: block; }
        #detail-panel .dp-close {
            position: absolute;
            top: 12px; right: 12px;
            width: 28px; height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text3);
            font-size: 20px;
            border-radius: 6px;
        }
        #detail-panel .dp-close:hover { background: var(--qian3); color: var(--text); }
        #detail-panel .dp-cn-title {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 4px;
            line-height: 1.4;
            color: var(--text);
            padding-right: 30px;
        }
        #detail-panel .dp-en-title {
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 10px;
            line-height: 1.4;
            font-style: italic;
        }
        #detail-panel .dp-stars {
            display: flex;
            gap: 2px;
            margin-bottom: 8px;
        }
        .star { color: var(--neutral); font-size: 14px; }
        .star.empty { color: var(--qian3); }
        #detail-panel .dp-meta-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
            font-size: 12px;
            color: var(--text2);
        }
        #detail-panel .dp-meta-row .dp-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
        }
        .badge-today { background: var(--accent); color: white; }
        .badge-important { background: var(--qian5); color: white; }
        .badge-major { background: var(--neutral); color: var(--qian1); }
        #detail-panel .dp-tags { margin: 12px 0; }
        .tag-chip {
            display: inline-block;
            padding: 3px 10px;
            background: var(--qian2);
            border: 1px solid var(--qian3);
            border-radius: 5px;
            font-size: 11px;
            margin: 0 4px 4px 0;
            color: var(--text2);
        }
        #detail-panel .dp-summary {
            font-size: 13px;
            line-height: 1.7;
            color: var(--text2);
            margin-bottom: 10px;
            padding: 10px;
            background: var(--qian2);
            border-radius: 8px;
        }
        #detail-panel .dp-insight {
            font-size: 13px;
            line-height: 1.7;
            color: var(--accent);
            margin-bottom: 16px;
            padding: 10px;
            background: rgba(255, 107, 53, 0.08);
            border-left: 3px solid var(--accent);
            border-radius: 0 8px 8px 0;
        }
        #detail-panel a.dp-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--accent), #E85D2E);
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        #cat-info {
            position: fixed;
            left: 296px;
            top: 66px;
            width: 320px;
            background: rgba(10, 31, 59, 0.98);
            border: 1px solid var(--qian3);
            border-radius: 12px;
            padding: 16px;
            display: none;
            z-index: 120;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        #cat-info.visible { display: block; }
        #cat-info h4 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #cat-info .cat-desc {
            font-size: 12px;
            color: var(--text2);
            line-height: 1.6;
            margin-bottom: 10px;
        }
        #cat-info .cat-stats {
            font-size: 12px;
            color: var(--text3);
            display: flex;
            gap: 16px;
            margin-bottom: 10px;
        }
        #cat-info .cat-summary {
            font-size: 11px;
            color: var(--text2);
            line-height: 1.6;
            padding: 8px;
            background: var(--qian2);
            border-radius: 6px;
            border-left: 3px solid var(--accent);
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>
            <div class="logo">卯</div>
            卯时AI · 情报知识图谱
        </h1>
        <div id="header-stats">
            <span id="stat-today">今日 0 条</span>
            <span id="stat-nodes">0 节点</span>
            <span id="stat-edges">0 连线</span>
        </div>
    </div>
    <div id="main">
        <div id="sidebar">
            <div class="section">
                <input type="text" id="search-box" placeholder="搜索文章、标签、来源、摘要关键词...">
                <div class="search-status" id="search-status"></div>
            </div>
            <div class="section" id="today-section-wrapper">
                <div class="section-title">今日动态</div>
                <div id="today-content"></div>
            </div>
            <div class="section">
                <div class="section-title">分类 &amp; 标签</div>
                <div id="cat-list"></div>
            </div>
            <div class="section">
                <div class="section-title">显示控制</div>
                <button class="btn" id="btn-toggle-articles">显示文章节点</button>
                <button class="btn" id="btn-physics">暂停物理</button>
                <button class="btn" id="btn-reset">重置视图</button>
                <div class="hint">
                    悬停节点暂停物理 · 点击标签展开文章<br>
                    点击分类查看介绍 · 滚轮缩放 · 拖拽平移
                </div>
            </div>
        </div>
        <div id="graph-container"></div>
    </div>
    <div id="cat-info">
        <span class="dp-close" onclick="closeCatInfo()">×</span>
        <h4 id="cat-info-title"></h4>
        <div class="cat-desc" id="cat-info-desc"></div>
        <div class="cat-stats" id="cat-info-stats"></div>
        <div class="cat-summary" id="cat-info-summary"></div>
    </div>
    <div id="detail-panel">
        <span class="dp-close" onclick="closeDetail()">×</span>
        <div class="dp-cn-title" id="dp-cn-title"></div>
        <div class="dp-en-title" id="dp-en-title"></div>
        <div class="dp-stars" id="dp-stars"></div>
        <div class="dp-meta-row" id="dp-meta"></div>
        <div class="dp-tags" id="dp-tags"></div>
        <div class="dp-summary" id="dp-summary"></div>
        <div class="dp-insight" id="dp-insight"></div>
        <a class="dp-link" id="dp-link" href="#" target="_blank">阅读原文 →</a>
    </div>
<script>
const COLORS = {
    'ai-search': '#FF6B35',
    'agentic-b2b': '#4A7BC3',
    'ai-industry': '#E6B85C',
    'academic': '#5A92E5'
};
const CAT_CONFIG = {
    'ai-search': {emoji: '🔍', name: 'AI搜索'},
    'agentic-b2b': {emoji: '🤖', name: 'Agentic B2B'},
    'ai-industry': {emoji: '🏭', name: 'AI行业动态'},
    'academic': {emoji: '📚', name: '学术研究'}
};
const HIGHLIGHT_COLOR = '#00E5FF';
const DIM_COLOR = '#1A365D';

let network, nodes, edges, allNodes, allEdges, graphData;
let articlesVisible = false;
let physicsEnabled = true;
let hoverPaused = false;
let activeCategories = new Set(Object.keys(CAT_CONFIG));
let expandedTags = new Set();
let selectedNodeId = null;
let dimmedNodeIds = new Set();
let originalNodeColors = {};

async function init() {
    try {
        const cacheBuster = '?v=' + Date.now();
        const resp = await fetch('graph-data.json' + cacheBuster);
        graphData = await resp.json();
        document.getElementById('stat-nodes').textContent = graphData.nodes.length + ' 节点';
        document.getElementById('stat-edges').textContent = graphData.edges.length + ' 连线';
        if (graphData.today_articles > 0) {
            document.getElementById('stat-today').textContent = '今日 ' + graphData.today_articles + ' 条';
            document.getElementById('stat-today').style.color = '#FF6B35';
        }
        const visNodes = graphData.nodes.map(n => {
            const base = {
                id: n.id,
                label: n.label,
                color: {
                    background: n.color,
                    border: n.border_color || '#ffffff',
                    highlight: { background: n.color, border: HIGHLIGHT_COLOR }
                },
                shadow: { enabled: true, color: n.color, size: n.type === 'category' ? 20 : 8, x: 0, y: 0 }
            };
            if (n.type === 'category') {
                const catId = n.id.replace('cat_', '');
                const cfg = CAT_CONFIG[catId];
                return {
                    ...base,
                    shape: 'dot',
                    size: n.size || 45,
                    font: { size: 15, color: '#F8FAFC', face: 'sans-serif', strokeWidth: 3, strokeColor: '#0A1F3B' },
                    borderWidth: 3,
                    borderWidthSelected: 5,
                    title: (cfg?.emoji || '') + ' ' + n.label + '\n' + (n.description || '') + '\n点击查看详情',
                    data: { ...n }
                };
            } else if (n.type === 'tag') {
                return {
                    ...base,
                    shape: 'dot',
                    size: n.size || 20,
                    font: { size: 12, color: '#CBD5E1', face: 'sans-serif' },
                    borderWidth: 2,
                    borderWidthSelected: 4,
                    title: '标签: ' + n.label + '\n' + (n.count || 0) + ' 篇文章\n平均重要度: ' + (n.avg_importance || 3) + '\n点击展开文章',
                    hidden: false,
                    data: { ...n }
                };
            } else {
                const isToday = n.is_today;
                const isImportant = n.is_important_source;
                const isMajor = n.is_major_news;
                let titleLines = [];
                if (n.cn_title) titleLines.push(n.cn_title);
                else titleLines.push(n.label);
                if (n.title_en && n.title_en !== n.label) titleLines.push('(EN) ' + n.title_en);
                titleLines.push('日期: ' + (n.date || '未知'));
                titleLines.push('重要度: ' + '★'.repeat(n.importance || 3) + '☆'.repeat(5 - (n.importance || 3)));
                if (isToday) titleLines.push('今日新增');
                if (isImportant) titleLines.push('重要来源');
                if (isMajor) titleLines.push('重大新闻');
                if (n.source) titleLines.push('来源: ' + n.source);
                if (n.tags && n.tags.length) titleLines.push('标签: ' + n.tags.join(', '));
                if (n.cn_summary) titleLines.push('摘要: ' + n.cn_summary.substring(0, 120) + '...');
                else if (n.summary) titleLines.push('摘要: ' + n.summary.substring(0, 120) + '...');
                titleLines.push('点击查看详情');
                return {
                    ...base,
                    shape: 'dot',
                    size: n.size || 7,
                    font: { size: 10, color: '#94A3B8', face: 'sans-serif' },
                    borderWidth: n.border_width || 1,
                    borderWidthSelected: 4,
                    title: titleLines.join('\n'),
                    hidden: true,
                    data: { ...n }
                };
            }
        });
        const visEdges = graphData.edges.map((e, i) => {
            const src = graphData.nodes.find(n => n.id === e.source);
            const tgt = graphData.nodes.find(n => n.id === e.target);
            const cat = src?.category || tgt?.category || 'default';
            const color = graphData.category_colors[cat] || '#64748B';
            const isInterCat = e.type === 'inter-cat';
            const isCross = e.type === 'cross';
            return {
                id: 'edge_' + i,
                from: e.source,
                to: e.target,
                color: {
                    color: isInterCat ? '#3A64A1' : (isCross ? '#8B5CF6' : color),
                    opacity: isInterCat ? 0.25 : (isCross ? 0.3 : 0.55)
                },
                width: isInterCat ? 1 : (src?.type === 'category' ? 2 : 1.2),
                arrows: isInterCat ? undefined : 'to',
                dashes: isInterCat || isCross,
                title: e.label || '',
                hidden: false,
                smooth: { type: 'continuous' }
            };
        });
        nodes = new vis.DataSet(visNodes);
        edges = new vis.DataSet(visEdges);
        allNodes = visNodes;
        allEdges = visEdges;

        // Default show today's articles
        visNodes.forEach(n => {
            if (n.data?.type === 'article' && n.data?.is_today) {
                n.hidden = false;
            }
            originalNodeColors[n.id] = {
                background: n.color.background,
                border: n.color.border
            };
        });

        const container = document.getElementById('graph-container');
        const options = {
            nodes: {
                borderWidth: 2,
                borderWidthSelected: 4,
                shadow: true
            },
            edges: {
                smooth: { type: 'continuous', roundness: 0.5 },
                selectionWidth: 3
            },
            physics: {
                enabled: true,
                forceAtlas2Based: {
                    gravitationalConstant: -45,
                    centralGravity: 0.018,
                    springLength: 115,
                    springConstant: 0.07,
                    damping: 0.4
                },
                maxVelocity: 30,
                minVelocity: 0.75,
                solver: 'forceAtlas2Based',
                stabilization: {
                    enabled: true,
                    iterations: 250,
                    updateInterval: 25
                }
            },
            interaction: {
                hover: true,
                tooltipDelay: 80,
                zoomView: true,
                dragView: true,
                navigationButtons: false,
                keyboard: false
            }
        };
        network = new vis.Network(container, { nodes, edges }, options);

        network.on('hoverNode', function(params) {
            container.style.cursor = 'pointer';
            if (physicsEnabled && !hoverPaused && network.physics && network.physics.stopSimulation) {
                hoverPaused = true;
                network.physics.stopSimulation();
            }
        });
        network.on('blurNode', function(params) {
            container.style.cursor = 'default';
            if (physicsEnabled && hoverPaused && network.physics && network.physics.startSimulation) {
                hoverPaused = false;
                network.physics.startSimulation();
            }
        });

        network.on('click', function(params) {
            if (params.nodes.length > 0) {
                const nodeId = params.nodes[0];
                const node = nodes.get(nodeId);
                handleNodeClick(node);
            } else {
                closeDetail();
                closeCatInfo();
                clearSelection();
            }
        });

        setupUI();
        renderTodaySection();
    } catch (err) {
        console.error('Init error:', err);
        document.getElementById('graph-container').innerHTML =
            '<div style="display:flex;height:100%;align-items:center;justify-content:center;color:#FF6B35;font-size:16px;">' +
            '加载失败: ' + err.message + '</div>';
    }
}

function getNeighborIds(nodeId) {
    const neighborIds = new Set([nodeId]);
    allEdges.forEach(e => {
        if (e.from === nodeId) neighborIds.add(e.to);
        if (e.to === nodeId) neighborIds.add(e.from);
    });
    return neighborIds;
}

function dimAllExcept(keepIds) {
    const updates = [];
    const edgeUpdates = [];
    nodes.get().forEach(n => {
        if (keepIds.has(n.id)) {
            if (dimmedNodeIds.has(n.id)) {
                const orig = originalNodeColors[n.id];
                updates.push({
                    id: n.id,
                    color: { background: orig.background, border: orig.border },
                    font: { color: n.data?.type === 'category' ? '#F8FAFC' : (n.data?.type === 'tag' ? '#CBD5E1' : '#94A3B8') }
                });
                dimmedNodeIds.delete(n.id);
            }
        } else {
            if (!dimmedNodeIds.has(n.id)) {
                updates.push({
                    id: n.id,
                    color: { background: DIM_COLOR, border: 'rgba(100,116,139,0.3)' },
                    font: { color: 'rgba(100,116,139,0.4)' }
                });
                dimmedNodeIds.add(n.id);
            }
        }
    });
    edges.get().forEach(e => {
        if (keepIds.has(e.from) || keepIds.has(e.to)) {
            edgeUpdates.push({ id: e.id, color: { opacity: e.id.includes('inter') ? 0.25 : 0.55 } });
        } else {
            edgeUpdates.push({ id: e.id, color: { opacity: 0.04 } });
        }
    });
    if (updates.length > 0) nodes.update(updates);
    if (edgeUpdates.length > 0) edges.update(edgeUpdates);
}

function restoreAllDimming() {
    const updates = [];
    const edgeUpdates = [];
    nodes.get().forEach(n => {
        if (dimmedNodeIds.has(n.id)) {
            const orig = originalNodeColors[n.id];
            updates.push({
                id: n.id,
                color: { background: orig.background, border: orig.border },
                font: { color: n.data?.type === 'category' ? '#F8FAFC' : (n.data?.type === 'tag' ? '#CBD5E1' : '#94A3B8') }
            });
        }
    });
    edges.get().forEach(e => {
        edgeUpdates.push({ id: e.id, color: { opacity: e.id.includes('inter') ? 0.25 : (e.id.includes('cross') ? 0.3 : 0.55) } });
    });
    if (updates.length > 0) nodes.update(updates);
    if (edgeUpdates.length > 0) edges.update(edgeUpdates);
    dimmedNodeIds.clear();
}

function handleNodeClick(node) {
    const data = node.data || {};
    if (data.type === 'category') {
        closeDetail();
        showCatInfo(data);
        clearSelection();
        const keepIds = getNeighborIds(node.id);
        nodes.get().forEach(n => {
            if (n.data?.category === data.id.replace('cat_', '')) keepIds.add(n.id);
        });
        dimAllExcept(keepIds);
    } else if (data.type === 'tag') {
        closeCatInfo();
        selectTag(node.id);
        toggleTagArticles(node.id);
        dimAllExcept(getNeighborIds(node.id));
    } else if (data.type === 'article') {
        closeCatInfo();
        selectArticle(node.id);
        showArticleDetail(data);
        dimAllExcept(getNeighborIds(node.id));
    }
}

function clearSelection() {
    if (selectedNodeId) {
        const prev = nodes.get(selectedNodeId);
        if (prev) {
            const originalSize = prev.data?.size || (prev.data?.type === 'tag' ? 20 : (prev.data?.type === 'category' ? 45 : 7));
            const originalBorder = prev.data?.border_color || '#ffffff';
            nodes.update({
                id: selectedNodeId,
                size: originalSize,
                borderWidth: prev.data?.type === 'category' ? 3 : (prev.data?.type === 'tag' ? 2 : 1),
                color: { border: originalBorder }
            });
        }
    }
    selectedNodeId = null;
    document.querySelectorAll('.tag-item').forEach(el => el.classList.remove('selected'));
    restoreAllDimming();
}

function selectTag(tagId) {
    clearSelection();
    selectedNodeId = tagId;
    nodes.update({
        id: tagId,
        size: 32,
        borderWidth: 4,
        color: { border: HIGHLIGHT_COLOR }
    });
    document.querySelectorAll('.tag-item').forEach(el => {
        el.classList.remove('selected');
        if (el.dataset.tagId === tagId) {
            el.classList.add('selected');
        }
    });
    network.focus(tagId, {
        scale: 1.4,
        animation: { duration: 400, easingFunction: 'easeInOutQuad' }
    });
    const node = nodes.get(tagId);
    if (node) {
        const origColor = node.color?.background;
        setTimeout(() => {
            nodes.update({ id: tagId, color: { background: HIGHLIGHT_COLOR, border: HIGHLIGHT_COLOR } });
            setTimeout(() => {
                nodes.update({ id: tagId, color: { background: origColor, border: HIGHLIGHT_COLOR } });
            }, 250);
        }, 100);
    }
}

function selectArticle(articleId) {
    clearSelection();
    selectedNodeId = articleId;
    nodes.update({
        id: articleId,
        size: 14,
        borderWidth: 3,
        color: { border: HIGHLIGHT_COLOR }
    });
    network.focus(articleId, {
        scale: 1.5,
        animation: { duration: 400, easingFunction: 'easeInOutQuad' }
    });
}

function showCatInfo(data) {
    const catId = data.id.replace('cat_', '');
    const cfg = CAT_CONFIG[catId];
    const desc = graphData.category_descriptions[catId] || '';
    const catArticles = allNodes.filter(n => n.data?.category === catId && n.data?.type === 'article');
    const catTags = allNodes.filter(n => n.data?.category === catId && n.data?.type === 'tag');
    const todayCount = catArticles.filter(n => n.data?.is_today).length;
    const recentCount = catArticles.filter(n => n.data?.is_recent).length;

    // Build summary text
    const tagNames = catTags.map(t => t.label).join('、');
    const todayTitles = catArticles.filter(n => n.data?.is_today).map(n => n.data?.cn_title || n.label).slice(0, 3);
    let summaryText = '该主题包含 ' + catTags.length + ' 个知识标签（' + tagNames + '），' + catArticles.length + ' 篇文章。';
    if (todayCount > 0) {
        summaryText += '今日新增 ' + todayCount + ' 篇：' + todayTitles.join('、') + '。';
    } else if (recentCount > 0) {
        summaryText += '近期新增 ' + recentCount + ' 篇情报。';
    }
    summaryText += '点击标签可展开查看关联文章，探索该领域的知识网络。';

    document.getElementById('cat-info-title').innerHTML =
        '<span style="color:' + data.color + '">' + (cfg?.emoji || '') + '</span> ' + data.label;
    document.getElementById('cat-info-desc').textContent = desc;
    document.getElementById('cat-info-stats').innerHTML =
        '文章 ' + catArticles.length + ' &nbsp;|&nbsp; 标签 ' + catTags.length +
        (todayCount > 0 ? ' &nbsp;|&nbsp; 今日 ' + todayCount + ' 条' : '');
    document.getElementById('cat-info-summary').textContent = summaryText;
    document.getElementById('cat-info').classList.add('visible');
}

function closeCatInfo() {
    document.getElementById('cat-info').classList.remove('visible');
}

function toggleTagArticles(tagId) {
    if (expandedTags.has(tagId)) {
        expandedTags.delete(tagId);
        const connectedEdges = allEdges.filter(e => e.from === tagId || e.to === tagId);
        connectedEdges.forEach(e => {
            const otherId = e.from === tagId ? e.to : e.from;
            const otherNode = allNodes.find(n => n.id === otherId);
            if (otherNode && otherNode.data?.type === 'article') {
                nodes.update({ id: otherId, hidden: true });
            }
        });
    } else {
        expandedTags.add(tagId);
        const connectedEdges = allEdges.filter(e => e.from === tagId || e.to === tagId);
        connectedEdges.forEach(e => {
            const otherId = e.from === tagId ? e.to : e.from;
            const otherNode = allNodes.find(n => n.id === otherId);
            if (otherNode && otherNode.data?.type === 'article') {
                const cat = otherNode.data?.category;
                if (activeCategories.has(cat)) {
                    nodes.update({ id: otherId, hidden: false });
                }
            }
        });
    }
    updateTagListUI();
}

function showArticleDetail(data) {
    const cnTitle = data.cn_title || data.label || '';
    const enTitle = data.title_en || '';
    document.getElementById('dp-cn-title').textContent = cnTitle;
    document.getElementById('dp-en-title').textContent = enTitle && enTitle !== cnTitle ? enTitle : '';
    const imp = data.importance || 3;
    const starsHtml = Array(5).fill(0).map((_, i) =>
        '<span class="star ' + (i < imp ? '' : 'empty') + '">★</span>'
    ).join('');
    document.getElementById('dp-stars').innerHTML = starsHtml;
    const catName = CAT_CONFIG[data.category]?.name || data.category;
    let metaHtml = '<span>日期 ' + (data.date || '') + '</span><span>' + catName + '</span>';
    if (data.source) metaHtml += '<span>' + data.source + '</span>';
    if (data.is_today) metaHtml += '<span class="dp-badge badge-today">今日</span>';
    if (data.is_important_source) metaHtml += '<span class="dp-badge badge-important">重要来源</span>';
    if (data.is_major_news) metaHtml += '<span class="dp-badge badge-major">重大新闻</span>';
    document.getElementById('dp-meta').innerHTML = metaHtml;
    const tags = data.tags || [];
    document.getElementById('dp-tags').innerHTML = tags.map(t => '<span class="tag-chip">' + t + '</span>').join('');
    const summary = data.cn_summary || data.summary || '';
    document.getElementById('dp-summary').textContent = summary;
    document.getElementById('dp-summary').style.display = summary ? 'block' : 'none';
    const insight = data.key_insight || '';
    document.getElementById('dp-insight').textContent = insight ? '💡 ' + insight : '';
    document.getElementById('dp-insight').style.display = insight ? 'block' : 'none';
    document.getElementById('dp-link').href = data.link || '#';
    document.getElementById('detail-panel').classList.add('visible');
}

function closeDetail() {
    document.getElementById('detail-panel').classList.remove('visible');
}

let todayFilterCat = null;
let todayExpanded = false;

function renderTodaySection() {
    const wrapper = document.getElementById('today-content');
    let todayArticles = allNodes.filter(n => n.data?.is_today && n.data?.type === 'article');
    
    // Apply category filter if set
    const isFiltered = todayFilterCat !== null;
    if (isFiltered) {
        todayArticles = todayArticles.filter(n => n.data?.category === todayFilterCat);
    }
    
    if (todayArticles.length === 0) {
        wrapper.innerHTML =
            '<div class="today-section empty">' +
            '<h3>今日动态</h3>' +
            '<div class="today-empty">暂无今日新增情报</div>' +
            '</div>';
        return;
    }
    
    const displayCount = todayExpanded ? todayArticles.length : Math.min(5, todayArticles.length);
    const hasMore = todayArticles.length > 5 && !todayExpanded;
    
    let html = '<div class="today-section">';
    if (isFiltered) {
        const cfg = CAT_CONFIG[todayFilterCat];
        html += '<h3>' + cfg.emoji + ' ' + cfg.name + ' · 今日 ' + todayArticles.length + ' 条 <span class="today-clear-filter" style="color:#64748B;font-size:12px;cursor:pointer;margin-left:8px;">[显示全部]</span></h3>';
    } else {
        html += '<h3>今日新增 ' + todayArticles.length + ' 条</h3>';
    }
    
    todayArticles.slice(0, displayCount).forEach(art => {
        const d = art.data;
        const badges = [];
        if (d.is_important_source) badges.push('<span class="ti-badge important">重要来源</span>');
        if (d.is_major_news) badges.push('<span class="ti-badge major">重大新闻</span>');
        html +=
            '<div class="today-item" data-node-id="' + art.id + '">' +
            '<div class="ti-title">' + (d.cn_title || d.label || '无标题') + '</div>' +
            '<div class="ti-meta">' +
            '<span>' + (CAT_CONFIG[d.category]?.name || d.category) + '</span>' +
            badges.join('') +
            '</div></div>';
    });
    
    if (hasMore) {
        html += '<div class="today-show-more" style="cursor:pointer;color:#FF6B35;font-size:13px;padding:8px 0;text-align:center;">▼ 展开剩余 ' + (todayArticles.length - 5) + ' 条</div>';
    } else if (todayExpanded && todayArticles.length > 5) {
        html += '<div class="today-show-more" style="cursor:pointer;color:#64748B;font-size:13px;padding:8px 0;text-align:center;">▲ 收起</div>';
    }
    
    html += '</div>';
    wrapper.innerHTML = html;
    
    // Bind click events to article items
    wrapper.querySelectorAll('.today-item').forEach(el => {
        el.addEventListener('click', () => {
            const nodeId = el.dataset.nodeId;
            const node = nodes.get(nodeId);
            if (node) {
                nodes.update({ id: nodeId, hidden: false });
                const parentTag = getParentTag(nodeId);
                if (parentTag && !expandedTags.has(parentTag)) {
                    expandedTags.add(parentTag);
                    updateTagListUI();
                }
                setTimeout(() => {
                    const freshNode = nodes.get(nodeId);
                    if (freshNode) handleNodeClick(freshNode);
                }, 120);
            }
        });
    });
    
    // Bind show-more / show-less
    const showMoreEl = wrapper.querySelector('.today-show-more');
    if (showMoreEl) {
        showMoreEl.addEventListener('click', () => {
            todayExpanded = !todayExpanded;
            renderTodaySection();
        });
    }
    
    // Bind clear-filter
    const clearFilterEl = wrapper.querySelector('.today-clear-filter');
    if (clearFilterEl) {
        clearFilterEl.addEventListener('click', () => {
            todayFilterCat = null;
            renderTodaySection();
        });
    }
}

function setupUI() {
    const catList = document.getElementById('cat-list');
    Object.entries(CAT_CONFIG).forEach(([cat, cfg]) => {
        const catTags = allNodes.filter(n => n.data?.category === cat && n.data?.type === 'tag');
        const catArticles = allNodes.filter(n => n.data?.category === cat && n.data?.type === 'article');
        const todayCount = catArticles.filter(n => n.data?.is_today).length;
        const item = document.createElement('div');
        item.className = 'cat-item';
        item.dataset.cat = cat;
        const header = document.createElement('div');
        header.className = 'cat-header';
        const todaySpanId = 'today-count-' + cat;
        header.innerHTML =
            '<div class="cat-dot" style="background:' + cfg.color + '"></div>' +
            '<div class="cat-name">' + cfg.emoji + ' ' + cfg.name + '</div>' +
            '<div class="cat-count">' + catTags.length + '标签' + (todayCount > 0 ? ' · <span class="today-count-span" id="' + todaySpanId + '" style="color:#FF6B35;cursor:pointer;text-decoration:underline;">' + todayCount + '新</span>' : '') + '</div>' +
            '<div class="cat-toggle">▶</div>';
        header.addEventListener('click', (e) => {
            if (e.target.closest('.cat-toggle')) {
                toggleTagList(cat, item);
            } else if (e.target.closest('.today-count-span')) {
                e.stopPropagation();
                showCategoryTodayArticles(cat);
            } else {
                toggleCategory(cat, header);
            }
        });
        const tagList = document.createElement('div');
        tagList.className = 'tag-list';
        tagList.id = 'taglist-' + cat;
        catTags.forEach(tagNode => {
            const tagEl = document.createElement('div');
            tagEl.className = 'tag-item';
            tagEl.dataset.tagId = tagNode.id;
            tagEl.innerHTML =
                '<div class="tag-dot" style="background:' + cfg.color + ';opacity:0.6"></div>' +
                '<div class="tag-label">' + tagNode.label + '</div>' +
                '<div class="tag-num">' + (tagNode.data?.count || 0) + '</div>';
            tagEl.addEventListener('click', (e) => {
                e.stopPropagation();
                selectTag(tagNode.id);
                toggleTagArticles(tagNode.id);
            });
            tagList.appendChild(tagEl);
        });
        item.appendChild(header);
        item.appendChild(tagList);
        catList.appendChild(item);
    });

    document.getElementById('search-box').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        const statusEl = document.getElementById('search-status');
        if (!query) {
            statusEl.textContent = '';
            const updates = [];
            nodes.get().forEach(n => {
                if (n.data?.type === 'article') {
                    const parentTag = getParentTag(n.id);
                    updates.push({ id: n.id, hidden: !expandedTags.has(parentTag) && !articlesVisible });
                } else {
                    updates.push({ id: n.id, hidden: false });
                }
            });
            nodes.update(updates);
            restoreAllDimming();
            return;
        }
        let matchCount = 0;
        const matchedIds = [];
        const neighborIds = new Set();
        const updates = [];
        nodes.get().forEach(n => {
            const d = n.data || {};
            const searchable = [
                n.label, d.title_en, d.cn_title, d.summary, d.cn_summary,
                d.key_insight, d.source
            ].filter(Boolean).join(' ').toLowerCase();
            const tagMatch = (d.tags || []).some(t => t.toLowerCase().includes(query));
            const match = searchable.includes(query) || tagMatch;
            if (d.type === 'category') {
                updates.push({ id: n.id, hidden: false });
            } else if (match) {
                updates.push({ id: n.id, hidden: false });
                matchCount++;
                matchedIds.push(n.id);
                allEdges.forEach(ed => {
                    if (ed.from === n.id) neighborIds.add(ed.to);
                    if (ed.to === n.id) neighborIds.add(ed.from);
                });
            } else {
                updates.push({ id: n.id, hidden: true });
            }
        });
        neighborIds.forEach(nid => {
            const existing = updates.find(u => u.id === nid);
            if (existing) existing.hidden = false;
            else updates.push({ id: nid, hidden: false });
        });
        nodes.update(updates);
        dimAllExcept(new Set([...matchedIds, ...neighborIds]));
        statusEl.innerHTML = matchCount > 0
            ? '找到 <span class="match-count">' + matchCount + '</span> 个匹配结果'
            : '未找到匹配结果';
        if (matchedIds.length > 0) {
            const firstId = matchedIds[0];
            const firstNode = nodes.get(firstId);
            if (firstNode) {
                if (firstNode.data?.type === 'tag') {
                    selectTag(firstId);
                } else if (firstNode.data?.type === 'article') {
                    selectArticle(firstId);
                } else {
                    network.focus(firstId, { scale: 1.3, animation: true });
                }
            }
        }
    });

    document.getElementById('btn-toggle-articles').addEventListener('click', function() {
        articlesVisible = !articlesVisible;
        this.classList.toggle('active', articlesVisible);
        this.textContent = articlesVisible ? '隐藏文章节点' : '显示文章节点';
        const updates = [];
        nodes.get().forEach(n => {
            if (n.data?.type === 'article') {
                if (articlesVisible) {
                    const cat = n.data?.category;
                    updates.push({ id: n.id, hidden: !activeCategories.has(cat) });
                } else {
                    const parentTag = getParentTag(n.id);
                    updates.push({ id: n.id, hidden: !expandedTags.has(parentTag) });
                }
            }
        });
        nodes.update(updates);
    });

    document.getElementById('btn-physics').addEventListener('click', function() {
        physicsEnabled = !physicsEnabled;
        this.classList.toggle('active', !physicsEnabled);
        this.textContent = physicsEnabled ? '暂停物理' : '恢复物理';
        network.setOptions({ physics: { enabled: physicsEnabled } });
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
        network.fit({ animation: { duration: 500 } });
        clearSelection();
    });
}

function showCategoryTodayArticles(cat) {
    const catTodayArts = allNodes.filter(n => n.data?.category === cat && n.data?.type === 'article' && n.data?.is_today);
    if (catTodayArts.length === 0) return;
    closeCatInfo();
    // Ensure all today's articles in this category are visible, plus their parent tags
    const updates = [];
    catTodayArts.forEach(art => {
        updates.push({ id: art.id, hidden: false });
        const parentTag = getParentTag(art.id);
        if (parentTag) {
            expandedTags.add(parentTag);
            updates.push({ id: parentTag, hidden: false });
        }
    });
    updateTagListUI();
    if (updates.length) nodes.update(updates);
    // Switch today section to show only this category
    todayFilterCat = cat;
    todayExpanded = true;
    renderTodaySection();
    // Focus first article and show its detail
    setTimeout(() => {
        const first = catTodayArts[0];
        if (first) {
            selectArticle(first.id);
            showArticleDetail(first.data);
            dimAllExcept(getNeighborIds(first.id));
        }
    }, 120);
}

function toggleTagList(cat, item) {
    const tagList = item.querySelector('.tag-list');
    const toggle = item.querySelector('.cat-toggle');
    tagList.classList.toggle('open');
    toggle.classList.toggle('open');
}

function updateTagListUI() {
    document.querySelectorAll('.tag-item').forEach(el => {
        const tagId = el.dataset.tagId;
        if (tagId) {
            el.style.opacity = expandedTags.has(tagId) ? '1' : '0.7';
        }
    });
}

function getParentTag(articleId) {
    const edge = allEdges.find(e =>
        (e.from === articleId && e.to.startsWith('tag_')) ||
        (e.to === articleId && e.from.startsWith('tag_'))
    );
    if (edge) {
        return edge.from.startsWith('tag_') ? edge.from : edge.to;
    }
    return null;
}

function toggleCategory(cat, el) {
    if (activeCategories.has(cat)) {
        activeCategories.delete(cat);
        el.classList.add('inactive');
    } else {
        activeCategories.add(cat);
        el.classList.remove('inactive');
    }
    const updates = [];
    nodes.get().forEach(n => {
        const nodeCat = n.data?.category;
        if (nodeCat === cat) {
            if (n.data?.type === 'article') {
                const parentTag = getParentTag(n.id);
                const show = activeCategories.has(cat) && (articlesVisible || expandedTags.has(parentTag));
                updates.push({ id: n.id, hidden: !show });
            } else {
                updates.push({ id: n.id, hidden: !activeCategories.has(cat) });
            }
        }
    });
    nodes.update(updates);
}

init();
</script>
