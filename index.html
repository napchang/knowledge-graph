<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卯时AI · 情报知识图谱</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0B0F19;
            color: #E2E8F0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        
        /* Header */
        #header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 52px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }
        
        #header h1 {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, #F97316, #EA580C);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            color: white;
        }
        
        #header-stats {
            font-size: 12px;
            color: #94A3B8;
            display: flex;
            gap: 16px;
        }
        
        /* Main Layout */
        #main {
            display: flex;
            height: 100vh;
            padding-top: 52px;
        }
        
        /* Sidebar */
        #sidebar {
            width: 260px;
            background: rgba(15, 23, 42, 0.95);
            border-right: 1px solid rgba(148, 163, 184, 0.1);
            padding: 16px;
            overflow-y: auto;
            flex-shrink: 0;
            z-index: 50;
        }
        
        .section { margin-bottom: 18px; }
        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #64748B;
            margin-bottom: 8px;
            font-weight: 700;
        }
        
        #search-box {
            width: 100%;
            padding: 8px 12px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            color: #E2E8F0;
            font-size: 13px;
            outline: none;
        }
        #search-box:focus { border-color: #F97316; }
        #search-box::placeholder { color: #475569; }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 2px;
            font-size: 13px;
        }
        .legend-item:hover { background: rgba(148, 163, 184, 0.1); }
        .legend-item.inactive { opacity: 0.3; }
        .legend-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .legend-text { flex: 1; }
        .legend-count { font-size: 11px; color: #64748B; }
        
        .btn {
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(30, 41, 59, 0.6);
            color: #E2E8F0;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 6px;
        }
        .btn:hover { background: rgba(51, 65, 85, 0.8); }
        .btn.active { background: #F97316; border-color: #F97316; color: white; }
        
        .hint {
            font-size: 11px;
            color: #475569;
            line-height: 1.6;
            margin-top: 6px;
        }
        
        /* Graph */
        #graph-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #0F172A 0%, #0B0F19 100%);
        }
        
        /* Detail Panel */
        #detail-panel {
            position: fixed;
            right: 16px;
            top: 68px;
            width: 380px;
            max-height: calc(100vh - 90px);
            background: rgba(15, 23, 42, 0.98);
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 12px;
            padding: 20px;
            display: none;
            overflow-y: auto;
            z-index: 150;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        #detail-panel.visible { display: block; }
        #detail-panel .dp-close {
            position: absolute;
            top: 12px; right: 12px;
            width: 26px; height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #64748B;
            font-size: 20px;
            border-radius: 6px;
        }
        #detail-panel .dp-close:hover { background: rgba(148, 163, 184, 0.15); color: #E2E8F0; }
        #detail-panel h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.5;
            padding-right: 30px;
            color: #F8FAFC;
        }
        #detail-panel .dp-meta {
            font-size: 12px;
            color: #64748B;
            margin-bottom: 12px;
        }
        #detail-panel .dp-tags { margin-bottom: 12px; }
        .tag {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 5px;
            font-size: 11px;
            margin: 0 4px 4px 0;
            color: #CBD5E1;
        }
        #detail-panel .dp-summary {
            font-size: 13px;
            line-height: 1.7;
            color: #94A3B8;
            margin-bottom: 16px;
        }
        #detail-panel a.dp-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #F97316, #EA580C);
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        
        /* Category Info Panel */
        #cat-info {
            position: fixed;
            left: 276px;
            top: 68px;
            width: 280px;
            background: rgba(15, 23, 42, 0.97);
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 12px;
            padding: 16px;
            display: none;
            z-index: 120;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        #cat-info.visible { display: block; }
        #cat-info h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #cat-info .cat-desc {
            font-size: 12px;
            color: #94A3B8;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        #cat-info .cat-stats {
            font-size: 12px;
            color: #64748B;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>
            <div class="logo">卯</div>
            卯时AI · 情报知识图谱
        </h1>
        <div id="header-stats">
            <span id="stat-nodes">0 节点</span>
            <span id="stat-edges">0 连线</span>
        </div>
    </div>
    
    <div id="main">
        <div id="sidebar">
            <div class="section">
                <div class="section-title">搜索</div>
                <input type="text" id="search-box" placeholder="搜索文章、标签...">
            </div>
            
            <div class="section">
                <div class="section-title">分类筛选</div>
                <div id="legend-container"></div>
            </div>
            
            <div class="section">
                <div class="section-title">显示控制</div>
                <button class="btn" id="btn-toggle-articles">📄 显示文章节点</button>
                <button class="btn" id="btn-physics">⏸ 暂停物理模拟</button>
                <button class="btn" id="btn-reset">⌂ 重置视图</button>
                <div class="hint">
                    点击标签展开文章<br>
                    点击分类查看介绍<br>
                    滚轮缩放 · 拖拽平移
                </div>
            </div>
        </div>
        
        <div id="graph-container"></div>
    </div>
    
    <div id="cat-info">
        <span class="dp-close" onclick="closeCatInfo()">×</span>
        <h4 id="cat-info-title"></h4>
        <div class="cat-desc" id="cat-info-desc"></div>
        <div class="cat-stats" id="cat-info-stats"></div>
    </div>
    
    <div id="detail-panel">
        <span class="dp-close" onclick="closeDetail()">×</span>
        <h3 id="dp-title"></h3>
        <div class="dp-meta" id="dp-meta"></div>
        <div class="dp-tags" id="dp-tags"></div>
        <div class="dp-summary" id="dp-summary"></div>
        <a class="dp-link" id="dp-link" href="#" target="_blank">阅读原文 →</a>
    </div>

<script>
const CAT_CONFIG = {
    "ai-search": {emoji: "🔍", name: "AI搜索", color: "#F97316", desc: "搜索引擎优化、GEO、AEO、SEO、排名算法、搜索产品商业化（Perplexity/Google/Bing/百度）"},
    "agentic-b2b": {emoji: "🤖", name: "Agentic B2B", color: "#3B82F6", desc: "营销自动化、销售工具、CRM、Workflow、HubSpot框架、Lead Gen、客户体验优化"},
    "ai-industry": {emoji: "🏭", name: "AI行业动态", color: "#10B981", desc: "产品发布、融资动态、大厂战略、Builder动态、开发者工具、行业趋势分析"},
    "academic": {emoji: "📚", name: "学术研究", color: "#8B5CF6", desc: "论文发布、算法研究、模型架构（MIT/Stanford/arXiv），标签映射到业务价值"}
};

let network, nodes, edges, allNodes, allEdges;
let articlesVisible = false;
let physicsEnabled = true;
let activeCategories = new Set(Object.keys(CAT_CONFIG));
let expandedTags = new Set();

async function init() {
    const resp = await fetch('graph-data.json');
    const data = await resp.json();
    
    // Build vis-network nodes
    const visNodes = data.nodes.map(n => {
        const base = {
            id: n.id,
            label: n.label,
            color: n.color,
            shadow: { enabled: true, color: n.color, size: 10, x: 0, y: 0 }
        };
        
        if (n.type === 'category') {
            const cfg = CAT_CONFIG[n.id.replace('cat_', '')];
            return {
                ...base,
                shape: 'dot',
                size: 45,
                font: { size: 15, color: '#F8FAFC', face: 'sans-serif', strokeWidth: 3, strokeColor: '#0B0F19' },
                borderWidth: 3,
                borderWidthSelected: 5,
                title: buildTooltip(n, cfg),
                data: { type: 'category', category: n.id.replace('cat_', ''), ...n }
            };
        } else if (n.type === 'tag') {
            return {
                ...base,
                shape: 'dot',
                size: 18 + Math.min((n.count || 0), 30) * 0.5,
                font: { size: 12, color: '#CBD5E1', face: 'sans-serif' },
                borderWidth: 2,
                borderWidthSelected: 4,
                title: buildTooltip(n),
                hidden: false,
                data: { type: 'tag', ...n }
            };
        } else {
            // Article
            const imp = n.importance || 3;
            return {
                ...base,
                shape: 'dot',
                size: 6 + imp * 1.5,
                font: { size: 10, color: '#94A3B8', face: 'sans-serif' },
                borderWidth: 1,
                borderWidthSelected: 3,
                title: buildTooltip(n),
                hidden: true,
                data: { type: 'article', ...n }
            };
        }
    });
    
    // Build vis-network edges
    const visEdges = data.edges.map((e, i) => {
        const src = data.nodes.find(n => n.id === e.source);
        const tgt = data.nodes.find(n => n.id === e.target);
        const cat = src?.category || tgt?.category || 'default';
        const color = data.category_colors[cat] || '#64748B';
        
        return {
            id: `edge_${i}`,
            from: e.source,
            to: e.target,
            color: { color: color, opacity: e.type === 'cross' ? 0.3 : 0.6 },
            width: e.type === 'cross' ? 1 : (src?.type === 'category' ? 2.5 : 1.5),
            arrows: 'to',
            dashes: e.type === 'cross',
            title: e.type === 'cross' ? '跨主题关联' : (src?.type === 'category' ? '分类包含' : '文章关联'),
            hidden: false
        };
    });
    
    nodes = new vis.DataSet(visNodes);
    edges = new vis.DataSet(visEdges);
    allNodes = visNodes;
    allEdges = visEdges;
    
    const container = document.getElementById('graph-container');
    
    const options = {
        nodes: {
            borderWidth: 2,
            borderWidthSelected: 4,
            shadow: true
        },
        edges: {
            smooth: { type: 'continuous', roundness: 0.5 },
            selectionWidth: 3
        },
        physics: {
            enabled: true,
            forceAtlas2Based: {
                gravitationalConstant: -80,
                centralGravity: 0.005,
                springLength: 120,
                springConstant: 0.08,
                damping: 0.4
            },
            maxVelocity: 50,
            minVelocity: 0.75,
            solver: 'forceAtlas2Based',
            stabilization: {
                enabled: true,
                iterations: 150,
                updateInterval: 25
            }
        },
        interaction: {
            hover: true,
            tooltipDelay: 150,
            zoomView: true,
            dragView: true,
            navigationButtons: true,
            keyboard: false
        },
        layout: {
            improvedLayout: true
        }
    };
    
    network = new vis.Network(container, { nodes, edges }, options);
    
    // Events
    network.on('click', function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = nodes.get(nodeId);
            handleNodeClick(node);
        } else {
            closeDetail();
            closeCatInfo();
        }
    });
    
    network.on('hoverNode', function(params) {
        document.getElementById('graph-container').style.cursor = 'pointer';
    });
    network.on('blurNode', function(params) {
        document.getElementById('graph-container').style.cursor = 'default';
    });
    
    // Stats
    document.getElementById('stat-nodes').textContent = `${visNodes.length} 节点`;
    document.getElementById('stat-edges').textContent = `${visEdges.length} 连线`;
    
    setupUI(data);
}

function buildTooltip(node, cfg) {
    if (node.type === 'category' && cfg) {
        return `<b>${cfg.emoji} ${cfg.name}</b><br/>${cfg.desc}<br/><i>点击查看详情</i>`;
    }
    if (node.type === 'tag') {
        return `<b>🏷 ${node.label}</b><br/>${node.count || 0} 篇文章<br/><i>点击展开文章</i>`;
    }
    if (node.type === 'article') {
        const title = node.cn_title || node.title || node.label;
        const summary = (node.summary || '').substring(0, 120);
        const tags = (node.tags || []).join(', ');
        return `<b>${title}</b><br/>📅 ${node.date || ''}<br/>🏷 ${tags}<br/>📝 ${summary}${summary.length >= 120 ? '...' : ''}<br/><i>点击查看详情</i>`;
    }
    return node.label;
}

function handleNodeClick(node) {
    const data = node.data || {};
    
    if (data.type === 'category') {
        showCatInfo(data.category);
    } else if (data.type === 'tag') {
        toggleTagArticles(node.id);
    } else if (data.type === 'article') {
        showArticleDetail(data);
    }
}

function showCatInfo(catId) {
    const cfg = CAT_CONFIG[catId];
    if (!cfg) return;
    
    const catArticles = allNodes.filter(n => n.data?.category === catId && n.data?.type === 'article');
    const catTags = allNodes.filter(n => n.data?.category === catId && n.data?.type === 'tag');
    
    document.getElementById('cat-info-title').innerHTML = `<span style="color:${cfg.color}">${cfg.emoji}</span> ${cfg.name}`;
    document.getElementById('cat-info-desc').textContent = cfg.desc;
    document.getElementById('cat-info-stats').innerHTML = 
        `📄 ${catArticles.length} 篇文章 &nbsp;|&nbsp; 🏷 ${catTags.length} 个标签`;
    document.getElementById('cat-info').classList.add('visible');
}

function closeCatInfo() {
    document.getElementById('cat-info').classList.remove('visible');
}

function toggleTagArticles(tagId) {
    if (expandedTags.has(tagId)) {
        expandedTags.delete(tagId);
        // Hide articles connected to this tag
        const connectedEdges = allEdges.filter(e => e.from === tagId || e.to === tagId);
        connectedEdges.forEach(e => {
            const otherId = e.from === tagId ? e.to : e.from;
            const otherNode = allNodes.find(n => n.id === otherId);
            if (otherNode && otherNode.data?.type === 'article') {
                nodes.update({ id: otherId, hidden: true });
            }
        });
    } else {
        expandedTags.add(tagId);
        // Show articles connected to this tag
        const connectedEdges = allEdges.filter(e => e.from === tagId || e.to === tagId);
        connectedEdges.forEach(e => {
            const otherId = e.from === tagId ? e.to : e.from;
            const otherNode = allNodes.find(n => n.id === otherId);
            if (otherNode && otherNode.data?.type === 'article') {
                const cat = otherNode.data?.category;
                if (activeCategories.has(cat)) {
                    nodes.update({ id: otherId, hidden: false });
                }
            }
        });
    }
}

function showArticleDetail(data) {
    const title = data.cn_title || data.title || data.label;
    document.getElementById('dp-title').textContent = title;
    
    const catName = CAT_CONFIG[data.category]?.name || data.category;
    document.getElementById('dp-meta').textContent = `${data.date || ''} · ${catName}`;
    
    const tags = data.tags || [];
    document.getElementById('dp-tags').innerHTML = tags.map(t => `<span class="tag">${t}</span>`).join('');
    
    const summary = data.summary || '';
    const insight = data.key_insight || '';
    let content = '';
    if (summary) content += `<p>${summary}</p>`;
    if (insight) content += `<p style="color:#F97316;margin-top:8px;">💡 ${insight}</p>`;
    document.getElementById('dp-summary').innerHTML = content;
    
    document.getElementById('dp-link').href = data.link || '#';
    document.getElementById('detail-panel').classList.add('visible');
}

function closeDetail() {
    document.getElementById('detail-panel').classList.remove('visible');
}

function setupUI(graphData) {
    // Legend
    const legendContainer = document.getElementById('legend-container');
    Object.entries(CAT_CONFIG).forEach(([cat, cfg]) => {
        const tagCount = graphData.nodes.filter(n => n.type === 'tag' && n.category === cat).length;
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.dataset.cat = cat;
        item.innerHTML = `
            <div class="legend-dot" style="background:${cfg.color}"></div>
            <div class="legend-text">${cfg.emoji} ${cfg.name}</div>
            <div class="legend-count">${tagCount}标签</div>
        `;
        item.addEventListener('click', () => toggleCategory(cat, item));
        legendContainer.appendChild(item);
    });
    
    // Search
    document.getElementById('search-box').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        if (!query) {
            // Reset visibility
            nodes.forEach(n => {
                if (n.data?.type === 'article') {
                    nodes.update({ id: n.id, hidden: !expandedTags.has(getParentTag(n.id)) });
                } else {
                    nodes.update({ id: n.id, hidden: false });
                }
            });
            return;
        }
        
        nodes.forEach(n => {
            const match = (n.label || '').toLowerCase().includes(query) ||
                         (n.data?.title || '').toLowerCase().includes(query) ||
                         (n.data?.cn_title || '').toLowerCase().includes(query) ||
                         (n.data?.tags || []).some(t => t.toLowerCase().includes(query));
            
            if (n.data?.type === 'category') {
                nodes.update({ id: n.id, hidden: false });
            } else if (match) {
                nodes.update({ id: n.id, hidden: false });
            } else {
                nodes.update({ id: n.id, hidden: true });
            }
        });
    });
    
    // Toggle articles
    document.getElementById('btn-toggle-articles').addEventListener('click', function() {
        articlesVisible = !articlesVisible;
        this.classList.toggle('active', articlesVisible);
        this.textContent = articlesVisible ? '📄 隐藏文章节点' : '📄 显示文章节点';
        
        nodes.forEach(n => {
            if (n.data?.type === 'article') {
                if (articlesVisible) {
                    const cat = n.data?.category;
                    nodes.update({ id: n.id, hidden: !activeCategories.has(cat) });
                } else {
                    nodes.update({ id: n.id, hidden: !expandedTags.has(getParentTag(n.id)) });
                }
            }
        });
    });
    
    // Physics toggle
    document.getElementById('btn-physics').addEventListener('click', function() {
        physicsEnabled = !physicsEnabled;
        this.classList.toggle('active', !physicsEnabled);
        this.textContent = physicsEnabled ? '⏸ 暂停物理模拟' : '▶ 恢复物理模拟';
        network.setOptions({ physics: { enabled: physicsEnabled } });
    });
    
    // Reset
    document.getElementById('btn-reset').addEventListener('click', () => {
        network.fit({ animation: { duration: 500 } });
    });
}

function getParentTag(articleId) {
    // Find tag connected to this article
    const edge = allEdges.find(e => 
        (e.from === articleId && e.to.startsWith('tag_')) ||
        (e.to === articleId && e.from.startsWith('tag_'))
    );
    if (edge) {
        return edge.from.startsWith('tag_') ? edge.from : edge.to;
    }
    return null;
}

function toggleCategory(cat, el) {
    if (activeCategories.has(cat)) {
        activeCategories.delete(cat);
        el.classList.add('inactive');
    } else {
        activeCategories.add(cat);
        el.classList.remove('inactive');
    }
    
    nodes.forEach(n => {
        const nodeCat = n.data?.category;
        if (nodeCat === cat) {
            if (n.data?.type === 'article') {
                const parentTag = getParentTag(n.id);
                const show = activeCategories.has(cat) && (articlesVisible || expandedTags.has(parentTag));
                nodes.update({ id: n.id, hidden: !show });
            } else {
                nodes.update({ id: n.id, hidden: !activeCategories.has(cat) });
            }
        }
    });
}

init();
</script>
</body>
</html>
