<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卯时AI · 情报知识图谱</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/dist/vis-network.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        :root {
            --primary: #1A237E;
            --accent: #FF6B35;
            --neutral: #E6B85C;
            --qian1: #0A1F3B;
            --qian2: #1A365D;
            --qian3: #2A4D7F;
            --qian4: #3A64A1;
            --qian5: #4A7BC3;
            --qian6: #5A92E5;
            --text: #E2E8F0;
            --text2: #94A3B8;
            --text3: #64748B;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--qian1);
            color: var(--text);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        
        /* Header */
        #header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 50px;
            background: rgba(10, 31, 59, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--qian3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }
        
        #header h1 {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo {
            width: 26px; height: 26px;
            background: linear-gradient(135deg, var(--accent), #E85D2E);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 11px;
            color: white;
        }
        
        #header-stats {
            font-size: 12px;
            color: var(--text2);
            display: flex;
            gap: 16px;
        }
        
        /* Main */
        #main {
            display: flex;
            height: 100vh;
            padding-top: 50px;
        }
        
        /* Sidebar */
        #sidebar {
            width: 280px;
            background: rgba(10, 31, 59, 0.97);
            border-right: 1px solid var(--qian3);
            padding: 14px;
            overflow-y: auto;
            flex-shrink: 0;
            z-index: 50;
        }
        
        .section { margin-bottom: 16px; }
        .section-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text3);
            margin-bottom: 8px;
            font-weight: 700;
        }
        
        #search-box {
            width: 100%;
            padding: 8px 12px;
            background: var(--qian2);
            border: 1px solid var(--qian3);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            outline: none;
        }
        #search-box:focus { border-color: var(--accent); }
        #search-box::placeholder { color: var(--text3); }
        
        /* Today badge */
        .today-badge {
            background: linear-gradient(135deg, var(--accent), #E85D2E);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .today-badge .count { font-weight: 700; font-size: 16px; }
        
        /* Category items */
        .cat-item {
            border-radius: 8px;
            margin-bottom: 4px;
            overflow: hidden;
        }
        .cat-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 8px;
        }
        .cat-header:hover { background: var(--qian2); }
        .cat-header.inactive { opacity: 0.35; }
        .cat-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .cat-name { flex: 1; font-size: 13px; }
        .cat-count { font-size: 11px; color: var(--text3); }
        .cat-toggle { font-size: 11px; color: var(--text3); transition: transform 0.2s; }
        .cat-toggle.open { transform: rotate(90deg); }
        
        .tag-list {
            padding-left: 32px;
            padding-bottom: 6px;
            display: none;
        }
        .tag-list.open { display: block; }
        .tag-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text2);
            transition: all 0.15s;
        }
        .tag-item:hover { background: var(--qian2); color: var(--text); }
        .tag-item .tag-dot { width: 6px; height: 6px; border-radius: 50%; }
        .tag-item .tag-label { flex: 1; }
        .tag-item .tag-num { font-size: 10px; color: var(--text3); }
        
        .btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--qian3);
            background: var(--qian2);
            color: var(--text);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 6px;
        }
        .btn:hover { background: var(--qian3); }
        .btn.active { background: var(--accent); border-color: var(--accent); color: white; }
        
        .hint {
            font-size: 11px;
            color: var(--text3);
            line-height: 1.5;
            margin-top: 6px;
        }
        
        /* Graph */
        #graph-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: radial-gradient(ellipse at center, var(--qian2) 0%, var(--qian1) 100%);
        }
        
        /* Detail Panel */
        #detail-panel {
            position: fixed;
            right: 16px;
            top: 66px;
            width: 400px;
            max-height: calc(100vh - 86px);
            background: rgba(10, 31, 59, 0.98);
            border: 1px solid var(--qian3);
            border-radius: 12px;
            padding: 20px;
            display: none;
            overflow-y: auto;
            z-index: 150;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        #detail-panel.visible { display: block; }
        #detail-panel .dp-close {
            position: absolute;
            top: 12px; right: 12px;
            width: 28px; height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text3);
            font-size: 20px;
            border-radius: 6px;
        }
        #detail-panel .dp-close:hover { background: var(--qian3); color: var(--text); }
        
        #detail-panel .dp-cn-title {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 4px;
            line-height: 1.4;
            color: var(--text);
            padding-right: 30px;
        }
        #detail-panel .dp-en-title {
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 10px;
            line-height: 1.4;
            font-style: italic;
        }
        #detail-panel .dp-stars {
            display: flex;
            gap: 2px;
            margin-bottom: 8px;
        }
        .star { color: var(--neutral); font-size: 14px; }
        .star.empty { color: var(--qian3); }
        
        #detail-panel .dp-meta-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
            font-size: 12px;
            color: var(--text2);
        }
        #detail-panel .dp-meta-row .dp-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
        }
        .badge-today { background: var(--accent); color: white; }
        .badge-important { background: var(--qian5); color: white; }
        .badge-major { background: var(--neutral); color: var(--qian1); }
        
        #detail-panel .dp-tags { margin: 12px 0; }
        .tag-chip {
            display: inline-block;
            padding: 3px 10px;
            background: var(--qian2);
            border: 1px solid var(--qian3);
            border-radius: 5px;
            font-size: 11px;
            margin: 0 4px 4px 0;
            color: var(--text2);
        }
        
        #detail-panel .dp-summary {
            font-size: 13px;
            line-height: 1.7;
            color: var(--text2);
            margin-bottom: 10px;
            padding: 10px;
            background: var(--qian2);
            border-radius: 8px;
        }
        #detail-panel .dp-insight {
            font-size: 13px;
            line-height: 1.7;
            color: var(--accent);
            margin-bottom: 16px;
            padding: 10px;
            background: rgba(255, 107, 53, 0.08);
            border-left: 3px solid var(--accent);
            border-radius: 0 8px 8px 0;
        }
        #detail-panel a.dp-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--accent), #E85D2E);
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        
        /* Category info panel */
        #cat-info {
            position: fixed;
            left: 296px;
            top: 66px;
            width: 280px;
            background: rgba(10, 31, 59, 0.98);
            border: 1px solid var(--qian3);
            border-radius: 12px;
            padding: 16px;
            display: none;
            z-index: 120;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        #cat-info.visible { display: block; }
        #cat-info h4 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #cat-info .cat-desc {
            font-size: 12px;
            color: var(--text2);
            line-height: 1.6;
            margin-bottom: 10px;
        }
        #cat-info .cat-stats {
            font-size: 12px;
            color: var(--text3);
            display: flex;
            gap: 16px;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>
            <div class="logo">卯</div>
            卯时AI · 情报知识图谱
        </h1>
        <div id="header-stats">
            <span id="stat-today">📅 今日 0 条</span>
            <span id="stat-nodes">0 节点</span>
            <span id="stat-edges">0 连线</span>
        </div>
    </div>
    
    <div id="main">
        <div id="sidebar">
            <div class="section">
                <div class="today-badge" id="today-badge" style="display:none">
                    <span>🔥 今日新增情报</span>
                    <span class="count" id="today-count">0</span>
                </div>
                <input type="text" id="search-box" placeholder="搜索文章、标签...">
            </div>
            
            <div class="section">
                <div class="section-title">分类 & 标签</div>
                <div id="cat-list"></div>
            </div>
            
            <div class="section">
                <div class="section-title">显示控制</div>
                <button class="btn" id="btn-toggle-articles">📄 显示文章节点</button>
                <button class="btn" id="btn-physics">⏸ 暂停物理</button>
                <button class="btn" id="btn-reset">⌂ 重置视图</button>
                <div class="hint">
                    点击标签展开文章<br>
                    点击分类查看介绍<br>
                    滚轮缩放 · 拖拽平移
                </div>
            </div>
        </div>
        
        <div id="graph-container"></div>
        <div id="debug-log" style="position:fixed;bottom:10px;left:300px;right:10px;background:rgba(255,0,0,0.9);color:white;padding:10px;font-size:12px;z-index:999;display:none;max-height:200px;overflow:auto;border-radius:8px;"></div>
    </div>
    
    <div id="cat-info">
        <span class="dp-close" onclick="closeCatInfo()">×</span>
        <h4 id="cat-info-title"></h4>
        <div class="cat-desc" id="cat-info-desc"></div>
        <div class="cat-stats" id="cat-info-stats"></div>
    </div>
    
    <div id="detail-panel">
        <span class="dp-close" onclick="closeDetail()">×</span>
        <div class="dp-cn-title" id="dp-cn-title"></div>
        <div class="dp-en-title" id="dp-en-title"></div>
        <div class="dp-stars" id="dp-stars"></div>
        <div class="dp-meta-row" id="dp-meta"></div>
        <div class="dp-tags" id="dp-tags"></div>
        <div class="dp-summary" id="dp-summary"></div>
        <div class="dp-insight" id="dp-insight"></div>
        <a class="dp-link" id="dp-link" href="#" target="_blank">阅读原文 →</a>
    </div>

<script>

const COLORS = {
    'ai-search': '#FF6B35',
    'agentic-b2b': '#4A7BC3',
    'ai-industry': '#E6B85C',
    'academic': '#5A92E5'
};

const CAT_CONFIG = {
    'ai-search': {emoji: '🔍', name: 'AI搜索'},
    'agentic-b2b': {emoji: '🤖', name: 'Agentic B2B'},
    'ai-industry': {emoji: '🏭', name: 'AI行业动态'},
    'academic': {emoji: '📚', name: '学术研究'}
};

let network, nodes, edges, allNodes, allEdges, graphData;
let articlesVisible = false;
let physicsEnabled = true;
let activeCategories = new Set(Object.keys(CAT_CONFIG));
let expandedTags = new Set();

function log(msg) {
    const el = document.getElementById('debug-log');
    if (el) {
        el.style.display = 'block';
        el.innerHTML += msg + '<br>';
    }
    console.log(msg);
}

async function init() {
    try {
    log('Step 1: Fetching data...');
    const resp = await fetch('graph-data.json');
    log('Step 2: Data fetched, parsing JSON...');
    graphData = await resp.json();
    log('Step 3: JSON parsed, nodes=' + graphData.nodes.length + ', edges=' + graphData.edges.length);
    
    // Update header stats
    document.getElementById('stat-nodes').textContent = `${graphData.nodes.length} 节点`;
    document.getElementById('stat-edges').textContent = `${graphData.edges.length} 连线`;
    if (graphData.today_articles > 0) {
        document.getElementById('today-badge').style.display = 'flex';
        document.getElementById('today-count').textContent = graphData.today_articles;
        document.getElementById('stat-today').textContent = `📅 今日 ${graphData.today_articles} 条`;
        document.getElementById('stat-today').style.color = '#FF6B35';
    }
    
    // Build vis-network nodes
    const visNodes = graphData.nodes.map(n => {
        const base = {
            id: n.id,
            label: n.label,
            color: {
                background: n.color,
                border: n.border_color || '#ffffff',
                highlight: { background: n.color, border: '#FF6B35' }
            },
            shadow: { enabled: true, color: n.color, size: n.type === 'category' ? 20 : 8, x: 0, y: 0 }
        };
        
        if (n.type === 'category') {
            return {
                ...base,
                shape: 'dot',
                size: n.size || 45,
                font: { size: 15, color: '#F8FAFC', face: 'sans-serif', strokeWidth: 3, strokeColor: '#0A1F3B' },
                borderWidth: 3,
                borderWidthSelected: 5,
                title: `${CAT_CONFIG[n.id.replace('cat_', '')]?.emoji || ''} ${n.label}\n${n.description || ''}\n点击查看详情`,
                data: { ...n }
            };
        } else if (n.type === 'tag') {
            return {
                ...base,
                shape: 'dot',
                size: n.size || 20,
                font: { size: 12, color: '#CBD5E1', face: 'sans-serif' },
                borderWidth: 2,
                borderWidthSelected: 4,
                title: `标签: ${n.label}\n${n.count || 0} 篇文章\n平均重要度: ${n.avg_importance || 3}\n点击展开文章`,
                hidden: false,
                data: { ...n }
            };
        } else {
            // Article
            const isToday = n.is_today;
            const isImportant = n.is_important_source;
            const isMajor = n.is_major_news;
            let titleLines = [];
            if (n.cn_title) titleLines.push(n.cn_title);
            else titleLines.push(n.label);
            if (n.title_en && n.title_en !== n.label) titleLines.push(`(EN) ${n.title_en}`);
            titleLines.push(`日期: ${n.date || '未知'}`);
            titleLines.push(`重要度: ${'★'.repeat(n.importance || 3)}${'☆'.repeat(5 - (n.importance || 3))}`);
            if (isToday) titleLines.push('🔥 今日新增');
            if (isImportant) titleLines.push('⭐ 重要来源');
            if (isMajor) titleLines.push('📢 重大新闻');
            if (n.tags && n.tags.length) titleLines.push(`标签: ${n.tags.join(', ')}`);
            if (n.cn_summary) titleLines.push(`摘要: ${n.cn_summary.substring(0, 100)}...`);
            else if (n.summary) titleLines.push(`摘要: ${n.summary.substring(0, 100)}...`);
            titleLines.push('点击查看详情');
            
            return {
                ...base,
                shape: 'dot',
                size: n.size || 7,
                font: { size: 10, color: '#94A3B8', face: 'sans-serif' },
                borderWidth: n.border_width || 1,
                borderWidthSelected: 4,
                title: titleLines.join('\n'),
                hidden: true,
                data: { ...n }
            };
        }
    });
    
    // Build vis-network edges
    const visEdges = graphData.edges.map((e, i) => {
        const src = graphData.nodes.find(n => n.id === e.source);
        const tgt = graphData.nodes.find(n => n.id === e.target);
        const cat = src?.category || tgt?.category || 'default';
        const color = graphData.category_colors[cat] || '#64748B';
        
        const isInterCat = e.type === 'inter-cat';
        const isCross = e.type === 'cross';
        
        return {
            id: `edge_${i}`,
            from: e.source,
            to: e.target,
            color: { 
                color: isInterCat ? '#3A64A1' : (isCross ? '#8B5CF6' : color), 
                opacity: isInterCat ? 0.25 : (isCross ? 0.3 : 0.55) 
            },
            width: isInterCat ? 1 : (src?.type === 'category' ? 2 : 1.2),
            arrows: isInterCat ? undefined : 'to',
            dashes: isInterCat || isCross,
            title: e.label || '',
            hidden: false,
            smooth: { type: 'continuous' }
        };
    });
    
    nodes = new vis.DataSet(visNodes);
    edges = new vis.DataSet(visEdges);
    allNodes = visNodes;
    allEdges = visEdges;
    
    const container = document.getElementById('graph-container');
    
    log('Step 4: Building visNodes...');
    
    const options = {
        nodes: {
            borderWidth: 2,
            borderWidthSelected: 4,
            shadow: true
        },
        edges: {
            smooth: { type: 'continuous', roundness: 0.5 },
            selectionWidth: 3
        },
        physics: {
            enabled: true,
            forceAtlas2Based: {
                gravitationalConstant: -70,
                centralGravity: 0.005,
                springLength: 130,
                springConstant: 0.08,
                damping: 0.35
            },
            maxVelocity: 50,
            minVelocity: 0.75,
            solver: 'forceAtlas2Based',
            stabilization: {
                enabled: true,
                iterations: 120,
                updateInterval: 25
            }
        },
        interaction: {
            hover: true,
            tooltipDelay: 100,
            zoomView: true,
            dragView: true,
            navigationButtons: true,
            keyboard: false
        }
    };
    
    log('Step 5: Creating network...');
    network = new vis.Network(container, { nodes, edges }, options);
    log('Step 6: Network created!');
    
    network.on('click', function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = nodes.get(nodeId);
            handleNodeClick(node);
        } else {
            closeDetail();
            closeCatInfo();
        }
    });
    
    network.on('hoverNode', function() {
        container.style.cursor = 'pointer';
    });
    network.on('blurNode', function() {
        container.style.cursor = 'default';
    });
    
    log('Step 7: Setting up UI...');
    setupUI();
    log('Step 8: Init complete!');
    document.getElementById('debug-log').style.display = 'none';
    } catch (err) {
        log('ERROR: ' + err.message);
        log('STACK: ' + err.stack);
    }
}

function handleNodeClick(node) {
    const data = node.data || {};
    
    if (data.type === 'category') {
        showCatInfo(data);
    } else if (data.type === 'tag') {
        toggleTagArticles(node.id);
    } else if (data.type === 'article') {
        showArticleDetail(data);
    }
}

function showCatInfo(data) {
    const catId = data.id.replace('cat_', '');
    const cfg = CAT_CONFIG[catId];
    const desc = graphData.category_descriptions[catId] || '';
    const catArticles = allNodes.filter(n => n.data?.category === catId && n.data?.type === 'article');
    const catTags = allNodes.filter(n => n.data?.category === catId && n.data?.type === 'tag');
    const todayCount = catArticles.filter(n => n.data?.is_today).length;
    
    document.getElementById('cat-info-title').innerHTML = 
        `<span style="color:${data.color}">${cfg?.emoji || ''}</span> ${data.label}`;
    document.getElementById('cat-info-desc').textContent = desc;
    document.getElementById('cat-info-stats').innerHTML = 
        `📄 ${catArticles.length} 篇文章 &nbsp;|&nbsp; 🏷 ${catTags.length} 个标签` +
        (todayCount > 0 ? ` &nbsp;|&nbsp; 🔥 今日 ${todayCount} 条` : '');
    document.getElementById('cat-info').classList.add('visible');
    closeDetail();
}

function closeCatInfo() {
    document.getElementById('cat-info').classList.remove('visible');
}

function toggleTagArticles(tagId) {
    if (expandedTags.has(tagId)) {
        expandedTags.delete(tagId);
        const connectedEdges = allEdges.filter(e => e.from === tagId || e.to === tagId);
        connectedEdges.forEach(e => {
            const otherId = e.from === tagId ? e.to : e.from;
            const otherNode = allNodes.find(n => n.id === otherId);
            if (otherNode && otherNode.data?.type === 'article') {
                nodes.update({ id: otherId, hidden: true });
            }
        });
    } else {
        expandedTags.add(tagId);
        const connectedEdges = allEdges.filter(e => e.from === tagId || e.to === tagId);
        connectedEdges.forEach(e => {
            const otherId = e.from === tagId ? e.to : e.from;
            const otherNode = allNodes.find(n => n.id === otherId);
            if (otherNode && otherNode.data?.type === 'article') {
                const cat = otherNode.data?.category;
                if (activeCategories.has(cat)) {
                    nodes.update({ id: otherId, hidden: false });
                }
            }
        });
    }
    updateTagListUI();
}

function showArticleDetail(data) {
    const cnTitle = data.cn_title || data.label || '';
    const enTitle = data.title_en || '';
    
    document.getElementById('dp-cn-title').textContent = cnTitle;
    document.getElementById('dp-en-title').textContent = enTitle && enTitle !== cnTitle ? enTitle : '';
    
    // Stars
    const imp = data.importance || 3;
    const starsHtml = Array(5).fill(0).map((_, i) => 
        `<span class="star ${i < imp ? '' : 'empty'}">★</span>`
    ).join('');
    document.getElementById('dp-stars').innerHTML = starsHtml;
    
    // Meta row
    const catName = CAT_CONFIG[data.category]?.name || data.category;
    let metaHtml = `<span>📅 ${data.date || ''}</span><span>🏷 ${catName}</span>`;
    if (data.is_today) metaHtml += `<span class="dp-badge badge-today">今日</span>`;
    if (data.is_important_source) metaHtml += `<span class="dp-badge badge-important">重要来源</span>`;
    if (data.is_major_news) metaHtml += `<span class="dp-badge badge-major">重大新闻</span>`;
    document.getElementById('dp-meta').innerHTML = metaHtml;
    
    // Tags
    const tags = data.tags || [];
    document.getElementById('dp-tags').innerHTML = tags.map(t => `<span class="tag-chip">${t}</span>`).join('');
    
    // Summary (prefer Chinese)
    const summary = data.cn_summary || data.summary || '';
    document.getElementById('dp-summary').textContent = summary;
    document.getElementById('dp-summary').style.display = summary ? 'block' : 'none';
    
    // Insight
    const insight = data.key_insight || '';
    document.getElementById('dp-insight').textContent = insight ? `💡 ${insight}` : '';
    document.getElementById('dp-insight').style.display = insight ? 'block' : 'none';
    
    document.getElementById('dp-link').href = data.link || '#';
    document.getElementById('detail-panel').classList.add('visible');
    closeCatInfo();
}

function closeDetail() {
    document.getElementById('detail-panel').classList.remove('visible');
}

function setupUI() {
    // Build category + tag list in sidebar
    const catList = document.getElementById('cat-list');
    
    Object.entries(CAT_CONFIG).forEach(([cat, cfg]) => {
        const catTags = allNodes.filter(n => n.data?.category === cat && n.data?.type === 'tag');
        const catArticles = allNodes.filter(n => n.data?.category === cat && n.data?.type === 'article');
        const todayCount = catArticles.filter(n => n.data?.is_today).length;
        
        const item = document.createElement('div');
        item.className = 'cat-item';
        item.dataset.cat = cat;
        
        const header = document.createElement('div');
        header.className = 'cat-header';
        header.innerHTML = `
            <div class="cat-dot" style="background:${cfg.color}"></div>
            <div class="cat-name">${cfg.emoji} ${cfg.name}</div>
            <div class="cat-count">${catTags.length}标签${todayCount > 0 ? ` · <span style="color:#FF6B35">${todayCount}新</span>` : ''}</div>
            <div class="cat-toggle">▶</div>
        `;
        header.addEventListener('click', (e) => {
            if (e.target.closest('.cat-toggle')) {
                toggleTagList(cat, item);
            } else {
                toggleCategory(cat, header);
            }
        });
        
        const tagList = document.createElement('div');
        tagList.className = 'tag-list';
        tagList.id = `taglist-${cat}`;
        
        catTags.forEach(tagNode => {
            const tagEl = document.createElement('div');
            tagEl.className = 'tag-item';
            tagEl.innerHTML = `
                <div class="tag-dot" style="background:${cfg.color};opacity:0.6"></div>
                <div class="tag-label">${tagNode.label}</div>
                <div class="tag-num">${tagNode.data?.count || 0}</div>
            `;
            tagEl.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleTagArticles(tagNode.id);
                // Focus network on this tag
                network.focus(tagNode.id, { scale: 1.2, animation: true });
            });
            tagList.appendChild(tagEl);
        });
        
        item.appendChild(header);
        item.appendChild(tagList);
        catList.appendChild(item);
    });
    
    // Search
    document.getElementById('search-box').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        if (!query) {
            nodes.forEach(n => {
                if (n.data?.type === 'article') {
                    const parentTag = getParentTag(n.id);
                    nodes.update({ id: n.id, hidden: !expandedTags.has(parentTag) && !articlesVisible });
                } else {
                    nodes.update({ id: n.id, hidden: false });
                }
            });
            return;
        }
        
        nodes.forEach(n => {
            const match = (n.label || '').toLowerCase().includes(query) ||
                         (n.data?.title_en || '').toLowerCase().includes(query) ||
                         (n.data?.cn_title || '').toLowerCase().includes(query) ||
                         (n.data?.tags || []).some(t => t.toLowerCase().includes(query));
            
            if (n.data?.type === 'category') {
                nodes.update({ id: n.id, hidden: false });
            } else if (match) {
                nodes.update({ id: n.id, hidden: false });
            } else {
                nodes.update({ id: n.id, hidden: true });
            }
        });
    });
    
    // Toggle articles
    document.getElementById('btn-toggle-articles').addEventListener('click', function() {
        articlesVisible = !articlesVisible;
        this.classList.toggle('active', articlesVisible);
        this.textContent = articlesVisible ? '📄 隐藏文章节点' : '📄 显示文章节点';
        
        nodes.forEach(n => {
            if (n.data?.type === 'article') {
                if (articlesVisible) {
                    const cat = n.data?.category;
                    nodes.update({ id: n.id, hidden: !activeCategories.has(cat) });
                } else {
                    const parentTag = getParentTag(n.id);
                    nodes.update({ id: n.id, hidden: !expandedTags.has(parentTag) });
                }
            }
        });
    });
    
    // Physics toggle
    document.getElementById('btn-physics').addEventListener('click', function() {
        physicsEnabled = !physicsEnabled;
        this.classList.toggle('active', !physicsEnabled);
        this.textContent = physicsEnabled ? '⏸ 暂停物理' : '▶ 恢复物理';
        network.setOptions({ physics: { enabled: physicsEnabled } });
    });
    
    // Reset
    document.getElementById('btn-reset').addEventListener('click', () => {
        network.fit({ animation: { duration: 500 } });
    });
}

function toggleTagList(cat, item) {
    const tagList = item.querySelector('.tag-list');
    const toggle = item.querySelector('.cat-toggle');
    tagList.classList.toggle('open');
    toggle.classList.toggle('open');
}

function updateTagListUI() {
    // Update tag list to show which are expanded
    document.querySelectorAll('.tag-item').forEach(el => {
        const tagId = el.closest('.tag-list')?.id;
        if (!tagId) return;
        // Could add visual indicator here
    });
}

function getParentTag(articleId) {
    const edge = allEdges.find(e => 
        (e.from === articleId && e.to.startsWith('tag_')) ||
        (e.to === articleId && e.from.startsWith('tag_'))
    );
    if (edge) {
        return edge.from.startsWith('tag_') ? edge.from : edge.to;
    }
    return null;
}

function toggleCategory(cat, el) {
    if (activeCategories.has(cat)) {
        activeCategories.delete(cat);
        el.classList.add('inactive');
    } else {
        activeCategories.add(cat);
        el.classList.remove('inactive');
    }
    
    nodes.forEach(n => {
        const nodeCat = n.data?.category;
        if (nodeCat === cat) {
            if (n.data?.type === 'article') {
                const parentTag = getParentTag(n.id);
                const show = activeCategories.has(cat) && (articlesVisible || expandedTags.has(parentTag));
                nodes.update({ id: n.id, hidden: !show });
            } else {
                nodes.update({ id: n.id, hidden: !activeCategories.has(cat) });
            }
        }
    });
}

init();
</script>
