<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卯时AI 知识图谱</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0F172A;
            color: #F8FAFC;
            overflow: hidden;
            height: 100vh;
        }
        #header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            background: #1E293B;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }
        #header h1 {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #header .logo {
            width: 28px; height: 28px;
            background: #F97316;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        #stats { font-size: 12px; color: #94A3B8; }
        #search-box {
            padding: 6px 12px;
            background: #0F172A;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #F8FAFC;
            font-size: 13px;
            width: 200px;
            outline: none;
        }
        #search-box::placeholder { color: #64748B; }
        #main { display: flex; height: 100vh; padding-top: 56px; }
        #sidebar {
            width: 280px;
            background: #1E293B;
            border-right: 1px solid #334155;
            padding: 16px;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .section { margin-bottom: 20px; }
        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94A3B8;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            cursor: pointer;
            font-size: 13px;
            opacity: 1;
            transition: opacity 0.2s;
        }
        .legend-item:hover { opacity: 0.7; }
        .legend-item.disabled { opacity: 0.3; }
        .legend-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .filter-slider {
            width: 100%;
            margin: 8px 0;
        }
        .filter-label {
            font-size: 11px;
            color: #94A3B8;
            display: flex;
            justify-content: space-between;
        }
        #graph-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        #detail-panel {
            position: fixed;
            right: 16px;
            top: 72px;
            width: 380px;
            max-height: calc(100vh - 88px);
            background: #1E293B;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            display: none;
            overflow-y: auto;
            z-index: 50;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        #detail-panel h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 10px;
            line-height: 1.5;
            padding-right: 24px;
        }
        #detail-panel .meta {
            font-size: 11px;
            color: #94A3B8;
            margin-bottom: 12px;
        }
        #detail-panel .content {
            font-size: 13px;
            line-height: 1.7;
            color: #CBD5E1;
            margin-bottom: 16px;
        }
        #detail-panel a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #F97316;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        #detail-panel a:hover { background: #FB923C; }
        .close-btn {
            position: absolute;
            top: 12px; right: 12px;
            width: 24px; height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #94A3B8;
            font-size: 16px;
            border-radius: 4px;
        }
        .close-btn:hover { background: #334155; }
        .tag-pill {
            display: inline-block;
            padding: 2px 8px;
            background: #0F172A;
            border: 1px solid #334155;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 4px;
            margin-bottom: 4px;
        }
        #controls {
            position: fixed;
            bottom: 16px;
            left: 296px;
            display: flex;
            gap: 8px;
            z-index: 50;
        }
        .ctrl-btn {
            padding: 6px 12px;
            background: #1E293B;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #F8FAFC;
            font-size: 12px;
            cursor: pointer;
        }
        .ctrl-btn:hover { background: #334155; }
        .ctrl-btn.active { background: #F97316; border-color: #F97316; }
        svg { width: 100%; height: 100%; }
        .node { cursor: pointer; }
        .node circle { transition: all 0.3s; }
        .link { transition: opacity 0.3s; }
        .node-label {
            font-size: 10px;
            fill: #CBD5E1;
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        .tooltip {
            position: absolute;
            padding: 8px 12px;
            background: #1E293B;
            border: 1px solid #334155;
            border-radius: 8px;
            font-size: 12px;
            pointer-events: none;
            z-index: 100;
            display: none;
            max-width: 300px;
        }
        .dimmed { opacity: 0.08 !important; }
    </style>
</head>
<body>
    <div id="header">
        <h1>
            <div class="logo">卯</div>
            卯时AI 知识图谱
        </h1>
        <input type="text" id="search-box" placeholder="搜索节点...">
        <div id="stats">加载中...</div>
    </div>
    
    <div id="main">
        <div id="sidebar">
            <div class="section">
                <div class="section-title">分类筛选</div>
                <div id="legend"></div>
            </div>
            <div class="section">
                <div class="section-title">时间范围</div>
                <div class="filter-label"><span>显示最近</span><span id="days-label">全部</span></div>
                <input type="range" id="days-slider" class="filter-slider" min="0" max="90" value="0" step="1">
                <div style="font-size:11px;color:#64748B;">0=全部, 7=7天, 30=30天, 90=90天</div>
            </div>
            <div class="section">
                <div class="section-title">重要性过滤</div>
                <div class="filter-label"><span>最低重要性</span><span id="imp-label">1</span></div>
                <input type="range" id="imp-slider" class="filter-slider" min="1" max="5" value="1" step="1">
            </div>
            <div class="section">
                <div class="section-title">操作说明</div>
                <p style="font-size: 11px; color: #94A3B8; line-height: 1.6;">
                    滚轮缩放 / 拖拽平移<br>
                    点击节点查看详情<br>
                    悬浮查看摘要<br>
                    双击空白处重置
                </p>
            </div>
        </div>
        
        <div id="graph-container"></div>
    </div>
    
    <div id="detail-panel">
        <span class="close-btn" onclick="closeDetail()">&times;</span>
        <h3 id="detail-title"></h3>
        <div class="meta" id="detail-meta"></div>
        <div id="detail-tags"></div>
        <div class="content" id="detail-content"></div>
        <a id="detail-link" href="#" target="_blank">阅读原文 &rarr;</a>
    </div>
    
    <div class="tooltip" id="tooltip"></div>
    
    <div id="controls">
        <button class="ctrl-btn" onclick="resetZoom()">重置视图</button>
        <button class="ctrl-btn" id="physics-btn" onclick="togglePhysics()">暂停物理</button>
    </div>

<script>
let graphData = null;
let simulation = null;
let svg, g, zoom;
let width, height;
let activeCategories = new Set();
let physicsEnabled = true;
let currentDays = 0;
let currentMinImportance = 1;
let allNodes = [], allLinks = [];

const categoryNames = {
    'ai-search': 'AI搜索',
    'agentic-b2b': 'Agentic B2B',
    'ai-industry': 'AI行业动态',
    'academic': '前沿研究'
};

async function loadData() {
    try {
        const resp = await fetch('graph-data.json');
        graphData = await resp.json();
        initGraph();
    } catch (e) {
        document.getElementById('stats').textContent = '数据加载失败';
        console.error(e);
    }
}

function parseDate(dateStr) {
    if (!dateStr) return new Date('2000-01-01');
    const d = new Date(dateStr);
    return isNaN(d) ? new Date('2000-01-01') : d;
}

function daysAgo(dateStr) {
    const d = parseDate(dateStr);
    const now = new Date();
    return Math.floor((now - d) / (1000 * 60 * 60 * 24));
}

function filterNodes() {
    const filtered = new Set();
    allNodes.forEach(n => {
        let visible = true;
        
        // Category filter
        if (n.type !== 'category' && !activeCategories.has(n.category)) {
            visible = false;
        }
        
        // Time filter (only for articles)
        if (visible && n.type === 'article' && currentDays > 0) {
            const days = daysAgo(n.date);
            if (days > currentDays) visible = false;
        }
        
        // Importance filter (only for articles)
        if (visible && n.type === 'article' && currentMinImportance > 1) {
            if ((n.importance || 3) < currentMinImportance) visible = false;
        }
        
        if (visible) filtered.add(n.id);
    });
    
    // Always show category nodes if any child is visible
    allNodes.forEach(n => {
        if (n.type === 'category') {
            const hasVisibleChild = allLinks.some(l => 
                (l.source.id === n.id && filtered.has(l.target.id)) ||
                (l.target.id === n.id && filtered.has(l.source.id))
            );
            if (hasVisibleChild) filtered.add(n.id);
        }
    });
    
    // Show tag nodes if connected to visible article
    allNodes.forEach(n => {
        if (n.type === 'tag') {
            const hasVisibleChild = allLinks.some(l => 
                l.source.id === n.id && filtered.has(l.target.id)
            );
            if (hasVisibleChild) filtered.add(n.id);
        }
    });
    
    return filtered;
}

function updateVisibility() {
    const visible = filterNodes();
    
    d3.selectAll('.node').style('display', d => visible.has(d.id) ? 'block' : 'none');
    d3.selectAll('.link').style('display', d => 
        visible.has(d.source.id) && visible.has(d.target.id) ? 'block' : 'none'
    );
    d3.selectAll('.node-label').style('display', d => {
        if (!visible.has(d.id)) return 'none';
        if (d.type === 'article') return 'none';
        return 'block';
    });
    
    const visibleCount = Array.from(visible).filter(id => {
        const n = allNodes.find(x => x.id === id);
        return n && n.type === 'article';
    }).length;
    
    document.getElementById('stats').textContent = 
        `${visibleCount} 篇文章 · ${allNodes.filter(n => n.type === 'tag').length} 个标签`;
}

function initGraph() {
    const container = document.getElementById('graph-container');
    width = container.clientWidth;
    height = container.clientHeight;
    
    graphData.categories.forEach(c => activeCategories.add(c));
    
    const legend = document.getElementById('legend');
    graphData.categories.forEach(cat => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.dataset.cat = cat;
        item.innerHTML = `
            <div class="legend-dot" style="background: ${graphData.category_colors[cat]};"></div>
            <span>${categoryNames[cat] || cat}</span>
        `;
        item.onclick = () => toggleCategory(cat, item);
        legend.appendChild(item);
    });
    
    // Sliders
    document.getElementById('days-slider').addEventListener('input', (e) => {
        currentDays = parseInt(e.target.value);
        document.getElementById('days-label').textContent = currentDays === 0 ? '全部' : `${currentDays}天`;
        updateVisibility();
    });
    
    document.getElementById('imp-slider').addEventListener('input', (e) => {
        currentMinImportance = parseInt(e.target.value);
        document.getElementById('imp-label').textContent = currentMinImportance;
        updateVisibility();
    });
    
    svg = d3.select('#graph-container')
        .append('svg')
        .attr('width', width)
        .attr('height', height);
    
    zoom = d3.zoom()
        .scaleExtent([0.1, 4])
        .on('zoom', (e) => g.attr('transform', e.transform));
    
    svg.call(zoom);
    
    g = svg.append('g');
    
    allNodes = graphData.nodes.map(d => ({...d}));
    allLinks = graphData.edges.map(d => ({...d}));
    
    simulation = d3.forceSimulation(allNodes)
        .force('link', d3.forceLink(allLinks).id(d => d.id).distance(d => {
            if (d.source.type === 'category' && d.target.type === 'tag') return 100;
            if (d.source.type === 'tag' && d.target.type === 'article') return 40;
            return 60;
        }))
        .force('charge', d3.forceManyBody().strength(d => {
            if (d.type === 'category') return -600;
            if (d.type === 'tag') return -250;
            return -60;
        }))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide().radius(d => d.size + 8));
    
    const link = g.append('g')
        .selectAll('line')
        .data(allLinks)
        .join('line')
        .attr('class', 'link')
        .attr('stroke', '#334155')
        .attr('stroke-opacity', 0.35)
        .attr('stroke-width', d => d.value === 2 ? 1.5 : 0.8);
    
    const node = g.append('g')
        .selectAll('.node')
        .data(allNodes)
        .join('g')
        .attr('class', 'node')
        .call(d3.drag()
            .on('start', dragstarted)
            .on('drag', dragged)
            .on('end', dragended));
    
    node.append('circle')
        .attr('r', d => d.size)
        .attr('fill', d => d.color)
        .attr('stroke', d => d.type === 'category' ? '#F8FAFC' : d.color)
        .attr('stroke-width', d => d.type === 'category' ? 3 : 1.5)
        .attr('stroke-opacity', 0.8);
    
    node.append('text')
        .attr('class', 'node-label')
        .attr('dy', d => d.size + 14)
        .attr('text-anchor', 'middle')
        .style('display', d => d.type === 'article' ? 'none' : 'block')
        .text(d => d.type !== 'article' ? d.label : '');
    
    // Tooltip
    const tooltip = d3.select('#tooltip');
    
    node.on('mouseenter', (event, d) => {
        let html = `<strong>${d.label}</strong><br/>`;
        if (d.type === 'tag') html += `<span style="color:#94A3B8">${d.count || 0} 篇文章</span>`;
        if (d.type === 'article') {
            html += `<span style="color:#94A3B8">${d.date || '未知日期'}</span><br/>`;
            html += `<span style="color:#CBD5E1">${(d.summary || '').substring(0, 80)}...</span>`;
        }
        tooltip.html(html)
            .style('display', 'block')
            .style('left', (event.pageX + 10) + 'px')
            .style('top', (event.pageY + 10) + 'px');
    }).on('mouseleave', () => {
        tooltip.style('display', 'none');
    });
    
    node.on('click', (event, d) => {
        event.stopPropagation();
        if (d.type === 'article') {
            showDetail(d);
        }
        focusNode(d);
    });
    
    svg.on('dblclick', () => {
        resetHighlight();
    });
    
    document.getElementById('search-box').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        if (!query) {
            d3.selectAll('.node').classed('dimmed', false);
            d3.selectAll('.link').classed('dimmed', false);
            return;
        }
        d3.selectAll('.node').classed('dimmed', d => !d.label.toLowerCase().includes(query));
        d3.selectAll('.link').classed('dimmed', true);
    });
    
    simulation.on('tick', () => {
        link
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);
        
        node.attr('transform', d => `translate(${d.x},${d.y})`);
    });
    
    updateVisibility();
}

function focusNode(d) {
    const connected = new Set();
    connected.add(d.id);
    
    allLinks.forEach(e => {
        if (e.source.id === d.id) connected.add(e.target.id);
        if (e.target.id === d.id) connected.add(e.source.id);
    });
    
    d3.selectAll('.node').classed('dimmed', n => !connected.has(n.id));
    d3.selectAll('.link').classed('dimmed', l => 
        !connected.has(l.source.id) || !connected.has(l.target.id));
}

function resetHighlight() {
    d3.selectAll('.node').classed('dimmed', false);
    d3.selectAll('.link').classed('dimmed', false);
    closeDetail();
}

function toggleCategory(cat, element) {
    if (activeCategories.has(cat)) {
        activeCategories.delete(cat);
        element.classList.add('disabled');
    } else {
        activeCategories.add(cat);
        element.classList.remove('disabled');
    }
    updateVisibility();
}

function showDetail(d) {
    document.getElementById('detail-title').textContent = d.title || d.label;
    document.getElementById('detail-meta').textContent = 
        `分类: ${categoryNames[d.category] || d.category} | 日期: ${d.date || '未知'}` + 
        (d.importance ? ` | 重要性: ${d.importance}/5` : '');
    
    const tagsHtml = (d.tags || []).map(t => `<span class="tag-pill">${t}</span>`).join('');
    document.getElementById('detail-tags').innerHTML = tagsHtml;
    
    document.getElementById('detail-content').textContent = d.summary || '';
    document.getElementById('detail-link').href = d.link || '#';
    document.getElementById('detail-panel').style.display = 'block';
}

function closeDetail() {
    document.getElementById('detail-panel').style.display = 'none';
}

function resetZoom() {
    svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
    resetHighlight();
}

function togglePhysics() {
    physicsEnabled = !physicsEnabled;
    document.getElementById('physics-btn').textContent = physicsEnabled ? '暂停物理' : '恢复物理';
    document.getElementById('physics-btn').classList.toggle('active', !physicsEnabled);
    if (physicsEnabled) {
        simulation.restart();
    } else {
        simulation.stop();
    }
}

function dragstarted(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
}

function dragged(event, d) {
    d.fx = event.x;
    d.fy = event.y;
}

function dragended(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
}

loadData();
</script>
</body>
</html>
