<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鍗椂AI 路 鎯呮姤鐭ヨ瘑鍥捐氨</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/dist/vis-network.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        :root {
            --primary: #1A237E;
            --accent: #FF6B35;
            --neutral: #E6B85C;
            --qian1: #0A1F3B;
            --qian2: #1A365D;
            --qian3: #2A4D7F;
            --qian4: #3A64A1;
            --qian5: #4A7BC3;
            --qian6: #5A92E5;
            --text: #E2E8F0;
            --text2: #94A3B8;
            --text3: #64748B;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--qian1);
            color: var(--text);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        
        /* Header */
        #header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 50px;
            background: rgba(10, 31, 59, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--qian3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }
        
        #header h1 {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo {
            width: 26px; height: 26px;
            background: linear-gradient(135deg, var(--accent), #E85D2E);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 11px;
            color: white;
        }
        
        #header-stats {
            font-size: 12px;
            color: var(--text2);
            display: flex;
            gap: 16px;
        }
        
        /* Main */
        #main {
            display: flex;
            height: 100vh;
            padding-top: 50px;
        }
        
        /* Sidebar */
        #sidebar {
            width: 280px;
            background: rgba(10, 31, 59, 0.97);
            border-right: 1px solid var(--qian3);
            padding: 14px;
            overflow-y: auto;
            flex-shrink: 0;
            z-index: 50;
        }
        
        .section { margin-bottom: 16px; }
        .section-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text3);
            margin-bottom: 8px;
            font-weight: 700;
        }
        
        #search-box {
            width: 100%;
            padding: 8px 12px;
            background: var(--qian2);
            border: 1px solid var(--qian3);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            outline: none;
        }
        #search-box:focus { border-color: var(--accent); }
        #search-box::placeholder { color: var(--text3); }
        
        .search-status {
            font-size: 11px;
            color: var(--text3);
            margin-top: 4px;
            min-height: 16px;
        }
        .search-status .match-count { color: var(--accent); font-weight: 600; }
        
        /* Today section */
        .today-section {
            background: linear-gradient(135deg, rgba(255,107,53,0.15), rgba(255,107,53,0.05));
            border: 1px solid rgba(255,107,53,0.3);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .today-section.empty {
            background: var(--qian2);
            border-color: var(--qian3);
        }
        .today-section h3 {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .today-section.empty h3 { color: var(--text3); }
        .today-item {
            padding: 8px 10px;
            background: rgba(10,31,59,0.5);
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.15s;
            border-left: 3px solid transparent;
        }
        .today-item:hover {
            background: var(--qian2);
            border-left-color: var(--accent);
        }
        .today-item .ti-title {
            font-size: 12px;
            font-weight: 500;
            color: var(--text);
            line-height: 1.4;
            margin-bottom: 3px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .today-item .ti-meta {
            font-size: 10px;
            color: var(--text3);
            display: flex;
            gap: 8px;
        }
        .today-item .ti-badge {
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 3px;
            font-weight: 600;
        }
        .ti-badge.important { background: var(--qian5); color: white; }
        .ti-badge.major { background: var(--neutral); color: var(--qian1); }
        .today-empty {
            font-size: 11px;
            color: var(--text3);
            text-align: center;
            padding: 8px 0;
        }
        .today-summary-text {
            font-size: 11px;
            color: var(--text2);
            line-height: 1.6;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,107,53,0.15);
        }
        
        /* Category items */
        .cat-item {
            border-radius: 8px;
            margin-bottom: 4px;
            overflow: hidden;
        }
        .cat-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 8px;
        }
        .cat-header:hover { background: var(--qian2); }
        .cat-header.inactive { opacity: 0.35; }
        .cat-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .cat-name { flex: 1; font-size: 13px; }
        .cat-count { font-size: 11px; color: var(--text3); }
        .cat-toggle { font-size: 11px; color: var(--text3); transition: transform 0.2s; }
        .cat-toggle.open { transform: rotate(90deg); }
        
        .tag-list {
            padding-left: 32px;
            padding-bottom: 6px;
            display: none;
        }
        .tag-list.open { display: block; }
        .tag-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text2);
            transition: all 0.15s;
        }
        .tag-item:hover { background: var(--qian2); color: var(--text); }
        .tag-item.selected { background: rgba(255,107,53,0.2); color: var(--accent); font-weight: 600; }
        .tag-item .tag-dot { width: 6px; height: 6px; border-radius: 50%; }
        .tag-item .tag-label { flex: 1; }
        .tag-item .tag-num { font-size: 10px; color: var(--text3); }
        
        .btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--qian3);
            background: var(--qian2);
            color: var(--text);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 6px;
        }
        .btn:hover { background: var(--qian3); }
        .btn.active { background: var(--accent); border-color: var(--accent); color: white; }
        
        .hint {
            font-size: 11px;
            color: var(--text3);
            line-height: 1.5;
            margin-top: 6px;
        }
        
        /* Graph */
        #graph-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: radial-gradient(ellipse at center, var(--qian2) 0%, var(--qian1) 100%);
        }
        
        /* Detail Panel */
        #detail-panel {
            position: fixed;
            right: 16px;
            top: 66px;
            width: 400px;
            max-height: calc(100vh - 86px);
            background: rgba(10, 31, 59, 0.98);
            border: 1px solid var(--qian3);
            border-radius: 12px;
            padding: 20px;
            display: none;
            overflow-y: auto;
            z-index: 150;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        #detail-panel.visible { display: block; }
        #detail-panel .dp-close {
            position: absolute;
            top: 12px; right: 12px;
            width: 28px; height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text3);
            font-size: 20px;
            border-radius: 6px;
        }
        #detail-panel .dp-close:hover { background: var(--qian3); color: var(--text); }
        
        #detail-panel .dp-cn-title {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 4px;
            line-height: 1.4;
            color: var(--text);
            padding-right: 30px;
        }
        #detail-panel .dp-en-title {
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 10px;
            line-height: 1.4;
            font-style: italic;
        }
        #detail-panel .dp-stars {
            display: flex;
            gap: 2px;
            margin-bottom: 8px;
        }
        .star { color: var(--neutral); font-size: 14px; }
        .star.empty { color: var(--qian3); }
        
        #detail-panel .dp-meta-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
            font-size: 12px;
            color: var(--text2);
        }
        #detail-panel .dp-meta-row .dp-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
        }
        .badge-today { background: var(--accent); color: white; }
        .badge-important { background: var(--qian5); color: white; }
        .badge-major { background: var(--neutral); color: var(--qian1); }
        
        #detail-panel .dp-tags { margin: 12px 0; }
        .tag-chip {
            display: inline-block;
            padding: 3px 10px;
            background: var(--qian2);
            border: 1px solid var(--qian3);
            border-radius: 5px;
            font-size: 11px;
            margin: 0 4px 4px 0;
            color: var(--text2);
        }
        
        #detail-panel .dp-summary {
            font-size: 13px;
            line-height: 1.7;
            color: var(--text2);
            margin-bottom: 10px;
            padding: 10px;
            background: var(--qian2);
            border-radius: 8px;
        }
        #detail-panel .dp-insight {
            font-size: 13px;
            line-height: 1.7;
            color: var(--accent);
            margin-bottom: 16px;
            padding: 10px;
            background: rgba(255, 107, 53, 0.08);
            border-left: 3px solid var(--accent);
            border-radius: 0 8px 8px 0;
        }
        #detail-panel a.dp-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--accent), #E85D2E);
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        
        /* Category info panel */
        #cat-info {
            position: fixed;
            left: 296px;
            top: 66px;
            width: 280px;
            background: rgba(10, 31, 59, 0.98);
            border: 1px solid var(--qian3);
            border-radius: 12px;
            padding: 16px;
            display: none;
            z-index: 120;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        #cat-info.visible { display: block; }
        #cat-info h4 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #cat-info .cat-desc {
            font-size: 12px;
            color: var(--text2);
            line-height: 1.6;
            margin-bottom: 10px;
        }
        #cat-info .cat-stats {
            font-size: 12px;
            color: var(--text3);
            display: flex;
            gap: 16px;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>
            <div class="logo">鍗?/div>
            鍗椂AI 路 鎯呮姤鐭ヨ瘑鍥捐氨
        </h1>
        <div id="header-stats">
            <span id="stat-today">馃搮 浠婃棩 0 鏉?/span>
            <span id="stat-nodes">0 鑺傜偣</span>
            <span id="stat-edges">0 杩炵嚎</span>
        </div>
    </div>
    
    <div id="main">
        <div id="sidebar">
            <div class="section">
                <input type="text" id="search-box" placeholder="鎼滅储鏂囩珷銆佹爣绛俱€佹潵婧愩€佹憳瑕佸叧閿瘝...">
                <div class="search-status" id="search-status"></div>
            </div>
            
            <div class="section" id="today-section-wrapper">
                <div class="section-title">馃敟 浠婃棩鍔ㄦ€?/div>
                <div id="today-content"></div>
            </div>
            
            <div class="section">
                <div class="section-title">鍒嗙被 & 鏍囩</div>
                <div id="cat-list"></div>
            </div>
            
            <div class="section">
                <div class="section-title">鏄剧ず鎺у埗</div>
                <button class="btn" id="btn-toggle-articles">馃搫 鏄剧ず鏂囩珷鑺傜偣</button>
                <button class="btn" id="btn-physics">鈴?鏆傚仠鐗╃悊</button>
                <button class="btn" id="btn-reset">鈱?閲嶇疆瑙嗗浘</button>
                <div class="hint">
                    鎮仠鑺傜偣鏆傚仠鐗╃悊 路 鐐瑰嚮鏍囩灞曞紑鏂囩珷<br>
                    鐐瑰嚮鍒嗙被鏌ョ湅浠嬬粛 路 婊氳疆缂╂斁 路 鎷栨嫿骞崇Щ
                </div>
            </div>
        </div>
        
        <div id="graph-container"></div>
    </div>
    
    <div id="cat-info">
        <span class="dp-close" onclick="closeCatInfo()">脳</span>
        <h4 id="cat-info-title"></h4>
        <div class="cat-desc" id="cat-info-desc"></div>
        <div class="cat-stats" id="cat-info-stats"></div>
    </div>
    
    <div id="detail-panel">
        <span class="dp-close" onclick="closeDetail()">脳</span>
        <div class="dp-cn-title" id="dp-cn-title"></div>
        <div class="dp-en-title" id="dp-en-title"></div>
        <div class="dp-stars" id="dp-stars"></div>
        <div class="dp-meta-row" id="dp-meta"></div>
        <div class="dp-tags" id="dp-tags"></div>
        <div class="dp-summary" id="dp-summary"></div>
        <div class="dp-insight" id="dp-insight"></div>
        <a class="dp-link" id="dp-link" href="#" target="_blank">闃呰鍘熸枃 鈫?/a>
    </div>

<script>

const COLORS = {
    'ai-search': '#FF6B35',
    'agentic-b2b': '#4A7BC3',
    'ai-industry': '#E6B85C',
    'academic': '#5A92E5'
};

const CAT_CONFIG = {
    'ai-search': {emoji: '馃攳', name: 'AI鎼滅储'},
    'agentic-b2b': {emoji: '馃', name: 'Agentic B2B'},
    'ai-industry': {emoji: '馃彮', name: 'AI琛屼笟鍔ㄦ€?},
    'academic': {emoji: '馃摎', name: '瀛︽湳鐮旂┒'}
};

let network, nodes, edges, allNodes, allEdges, graphData;
let articlesVisible = false;
let physicsEnabled = true;
let hoverPausedPhysics = false;
let activeCategories = new Set(Object.keys(CAT_CONFIG));
let expandedTags = new Set();
let selectedNodeId = null;

async function init() {
    try {
    const resp = await fetch('graph-data.json');
    graphData = await resp.json();
    
    // Update header stats
    document.getElementById('stat-nodes').textContent = `${graphData.nodes.length} 鑺傜偣`;
    document.getElementById('stat-edges').textContent = `${graphData.edges.length} 杩炵嚎`;
    if (graphData.today_articles > 0) {
        document.getElementById('stat-today').textContent = `馃搮 浠婃棩 ${graphData.today_articles} 鏉;
        document.getElementById('stat-today').style.color = '#FF6B35';
    }
    
    // Build vis-network nodes
    const visNodes = graphData.nodes.map(n => {
        const base = {
            id: n.id,
            label: n.label,
            color: {
                background: n.color,
                border: n.border_color || '#ffffff',
                highlight: { background: n.color, border: '#FF6B35' }
            },
            shadow: { enabled: true, color: n.color, size: n.type === 'category' ? 20 : 8, x: 0, y: 0 }
        };
        
        if (n.type === 'category') {
            const catId = n.id.replace('cat_', '');
            const cfg = CAT_CONFIG[catId];
            return {
                ...base,
                shape: 'dot',
                size: n.size || 45,
                font: { size: 15, color: '#F8FAFC', face: 'sans-serif', strokeWidth: 3, strokeColor: '#0A1F3B' },
                borderWidth: 3,
                borderWidthSelected: 5,
                title: `${cfg?.emoji || ''} ${n.label}\n${n.description || ''}\n鐐瑰嚮鏌ョ湅璇︽儏`,
                data: { ...n }
            };
        } else if (n.type === 'tag') {
            return {
                ...base,
                shape: 'dot',
                size: n.size || 20,
                font: { size: 12, color: '#CBD5E1', face: 'sans-serif' },
                borderWidth: 2,
                borderWidthSelected: 4,
                title: `鏍囩: ${n.label}\n${n.count || 0} 绡囨枃绔燶n骞冲潎閲嶈搴? ${n.avg_importance || 3}\n鐐瑰嚮灞曞紑鏂囩珷`,
                hidden: false,
                data: { ...n }
            };
        } else {
            // Article
            const isToday = n.is_today;
            const isImportant = n.is_important_source;
            const isMajor = n.is_major_news;
            let titleLines = [];
            if (n.cn_title) titleLines.push(n.cn_title);
            else titleLines.push(n.label);
            if (n.title_en && n.title_en !== n.label) titleLines.push(`(EN) ${n.title_en}`);
            titleLines.push(`鏃ユ湡: ${n.date || '鏈煡'}`);
            titleLines.push(`閲嶈搴? ${'鈽?.repeat(n.importance || 3)}${'鈽?.repeat(5 - (n.importance || 3))}`);
            if (isToday) titleLines.push('馃敟 浠婃棩鏂板');
            if (isImportant) titleLines.push('猸?閲嶈鏉ユ簮');
            if (isMajor) titleLines.push('馃摙 閲嶅ぇ鏂伴椈');
            if (n.source) titleLines.push(`鏉ユ簮: ${n.source}`);
            if (n.tags && n.tags.length) titleLines.push(`鏍囩: ${n.tags.join(', ')}`);
            if (n.cn_summary) titleLines.push(`鎽樿: ${n.cn_summary.substring(0, 120)}...`);
            else if (n.summary) titleLines.push(`鎽樿: ${n.summary.substring(0, 120)}...`);
            titleLines.push('鐐瑰嚮鏌ョ湅璇︽儏');
            
            return {
                ...base,
                shape: 'dot',
                size: n.size || 7,
                font: { size: 10, color: '#94A3B8', face: 'sans-serif' },
                borderWidth: n.border_width || 1,
                borderWidthSelected: 4,
                title: titleLines.join('\n'),
                hidden: true,
                data: { ...n }
            };
        }
    });
    
    // Build vis-network edges
    const visEdges = graphData.edges.map((e, i) => {
        const src = graphData.nodes.find(n => n.id === e.source);
        const tgt = graphData.nodes.find(n => n.id === e.target);
        const cat = src?.category || tgt?.category || 'default';
        const color = graphData.category_colors[cat] || '#64748B';
        
        const isInterCat = e.type === 'inter-cat';
        const isCross = e.type === 'cross';
        
        return {
            id: `edge_${i}`,
            from: e.source,
            to: e.target,
            color: { 
                color: isInterCat ? '#3A64A1' : (isCross ? '#8B5CF6' : color), 
                opacity: isInterCat ? 0.25 : (isCross ? 0.3 : 0.55) 
            },
            width: isInterCat ? 1 : (src?.type === 'category' ? 2 : 1.2),
            arrows: isInterCat ? undefined : 'to',
            dashes: isInterCat || isCross,
            title: e.label || '',
            hidden: false,
            smooth: { type: 'continuous' }
        };
    });
    
    nodes = new vis.DataSet(visNodes);
    edges = new vis.DataSet(visEdges);
    allNodes = visNodes;
    allEdges = visEdges;
    
    const container = document.getElementById('graph-container');
    
    const options = {
        nodes: {
            borderWidth: 2,
            borderWidthSelected: 4,
            shadow: true
        },
        edges: {
            smooth: { type: 'continuous', roundness: 0.5 },
            selectionWidth: 3
        },
        physics: {
            enabled: true,
            forceAtlas2Based: {
                gravitationalConstant: -45,
                centralGravity: 0.018,
                springLength: 115,
                springConstant: 0.07,
                damping: 0.4
            },
            maxVelocity: 30,
            minVelocity: 0.75,
            solver: 'forceAtlas2Based',
            stabilization: {
                enabled: true,
                iterations: 250,
                updateInterval: 25
            }
        },
        interaction: {
            hover: true,
            tooltipDelay: 80,
            zoomView: true,
            dragView: true,
            navigationButtons: false,
            keyboard: false
        }
    };
    
    network = new vis.Network(container, { nodes, edges }, options);
    
    // === FIX 1: Hover pause physics ===
    network.on('hoverNode', function(params) {
        container.style.cursor = 'pointer';
        if (physicsEnabled && !hoverPausedPhysics) {
            hoverPausedPhysics = true;
            network.setOptions({ physics: { enabled: false } });
        }
    });
    network.on('blurNode', function(params) {
        container.style.cursor = 'default';
        if (physicsEnabled && hoverPausedPhysics) {
            hoverPausedPhysics = false;
            network.setOptions({ physics: { enabled: true } });
        }
    });
    
    network.on('click', function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = nodes.get(nodeId);
            handleNodeClick(node);
        } else {
            closeDetail();
            closeCatInfo();
            clearSelection();
        }
    });
    
    setupUI();
    renderTodaySection();
    } catch (err) {
        console.error('Init error:', err);
        document.getElementById('graph-container').innerHTML = 
            '<div style="display:flex;height:100%;align-items:center;justify-content:center;color:#FF6B35;font-size:16px;">' +
            '鍔犺浇澶辫触: ' + err.message + '</div>';
    }
}

function handleNodeClick(node) {
    const data = node.data || {};
    
    if (data.type === 'category') {
        showCatInfo(data);
        clearSelection();
    } else if (data.type === 'tag') {
        selectTag(node.id);
        toggleTagArticles(node.id);
    } else if (data.type === 'article') {
        selectArticle(node.id);
        showArticleDetail(data);
    }
}

// === FIX 2: Selection highlighting ===
function clearSelection() {
    if (selectedNodeId) {
        const prev = nodes.get(selectedNodeId);
        if (prev) {
            const originalSize = prev.data?.size || (prev.data?.type === 'tag' ? 20 : (prev.data?.type === 'category' ? 45 : 7));
            const originalBorder = prev.data?.border_color || '#ffffff';
            nodes.update({
                id: selectedNodeId,
                size: originalSize,
                borderWidth: prev.data?.type === 'category' ? 3 : (prev.data?.type === 'tag' ? 2 : 1),
                color: { border: originalBorder }
            });
        }
    }
    selectedNodeId = null;
    document.querySelectorAll('.tag-item').forEach(el => el.classList.remove('selected'));
}

function selectTag(tagId) {
    clearSelection();
    selectedNodeId = tagId;
    
    // Highlight in graph
    nodes.update({
        id: tagId,
        size: 32,
        borderWidth: 4,
        color: { border: '#FF6B35' }
    });
    
    // Highlight in sidebar
    document.querySelectorAll('.tag-item').forEach(el => {
        el.classList.remove('selected');
        if (el.dataset.tagId === tagId) {
            el.classList.add('selected');
        }
    });
    
    // Focus with precise positioning
    network.focus(tagId, {
        scale: 1.4,
        animation: { duration: 400, easingFunction: 'easeInOutQuad' }
    });
    
    // Flash effect - briefly change color back and forth
    const node = nodes.get(tagId);
    if (node) {
        const origColor = node.color?.background;
        setTimeout(() => {
            nodes.update({ id: tagId, color: { background: '#FF6B35', border: '#FF6B35' } });
            setTimeout(() => {
                nodes.update({ id: tagId, color: { background: origColor, border: '#FF6B35' } });
            }, 250);
        }, 100);
    }
}

function selectArticle(articleId) {
    clearSelection();
    selectedNodeId = articleId;
    
    nodes.update({
        id: articleId,
        size: 14,
        borderWidth: 3,
        color: { border: '#FF6B35' }
    });
    
    network.focus(articleId, {
        scale: 1.5,
        animation: { duration: 400, easingFunction: 'easeInOutQuad' }
    });
}

function showCatInfo(data) {
    const catId = data.id.replace('cat_', '');
    const cfg = CAT_CONFIG[catId];
    const desc = graphData.category_descriptions[catId] || '';
    const catArticles = allNodes.filter(n => n.data?.category === catId && n.data?.type === 'article');
    const catTags = allNodes.filter(n => n.data?.category === catId && n.data?.type === 'tag');
    const todayCount = catArticles.filter(n => n.data?.is_today).length;
    
    document.getElementById('cat-info-title').innerHTML = 
        `<span style="color:${data.color}">${cfg?.emoji || ''}</span> ${data.label}`;
    document.getElementById('cat-info-desc').textContent = desc;
    document.getElementById('cat-info-stats').innerHTML = 
        `馃搫 ${catArticles.length} 绡囨枃绔?&nbsp;|&nbsp; 馃彿 ${catTags.length} 涓爣绛綻 +
        (todayCount > 0 ? ` &nbsp;|&nbsp; 馃敟 浠婃棩 ${todayCount} 鏉 : '');
    document.getElementById('cat-info').classList.add('visible');
    closeDetail();
    
    // Highlight category node briefly
    const catNodeId = data.id;
    nodes.update({ id: catNodeId, borderWidth: 5 });
    setTimeout(() => {
        nodes.update({ id: catNodeId, borderWidth: 3 });
    }, 600);
}

function closeCatInfo() {
    document.getElementById('cat-info').classList.remove('visible');
}

function toggleTagArticles(tagId) {
    if (expandedTags.has(tagId)) {
        expandedTags.delete(tagId);
        const connectedEdges = allEdges.filter(e => e.from === tagId || e.to === tagId);
        connectedEdges.forEach(e => {
            const otherId = e.from === tagId ? e.to : e.from;
            const otherNode = allNodes.find(n => n.id === otherId);
            if (otherNode && otherNode.data?.type === 'article') {
                nodes.update({ id: otherId, hidden: true });
            }
        });
    } else {
        expandedTags.add(tagId);
        const connectedEdges = allEdges.filter(e => e.from === tagId || e.to === tagId);
        connectedEdges.forEach(e => {
            const otherId = e.from === tagId ? e.to : e.from;
            const otherNode = allNodes.find(n => n.id === otherId);
            if (otherNode && otherNode.data?.type === 'article') {
                const cat = otherNode.data?.category;
                if (activeCategories.has(cat)) {
                    nodes.update({ id: otherId, hidden: false });
                }
            }
        });
    }
    updateTagListUI();
}

function showArticleDetail(data) {
    const cnTitle = data.cn_title || data.label || '';
    const enTitle = data.title_en || '';
    
    document.getElementById('dp-cn-title').textContent = cnTitle;
    document.getElementById('dp-en-title').textContent = enTitle && enTitle !== cnTitle ? enTitle : '';
    
    const imp = data.importance || 3;
    const starsHtml = Array(5).fill(0).map((_, i) => 
        `<span class="star ${i < imp ? '' : 'empty'}">鈽?/span>`
    ).join('');
    document.getElementById('dp-stars').innerHTML = starsHtml;
    
    const catName = CAT_CONFIG[data.category]?.name || data.category;
    let metaHtml = `<span>馃搮 ${data.date || ''}</span><span>馃彿 ${catName}</span>`;
    if (data.source) metaHtml += `<span>${data.source}</span>`;
    if (data.is_today) metaHtml += `<span class="dp-badge badge-today">浠婃棩</span>`;
    if (data.is_important_source) metaHtml += `<span class="dp-badge badge-important">閲嶈鏉ユ簮</span>`;
    if (data.is_major_news) metaHtml += `<span class="dp-badge badge-major">閲嶅ぇ鏂伴椈</span>`;
    document.getElementById('dp-meta').innerHTML = metaHtml;
    
    const tags = data.tags || [];
    document.getElementById('dp-tags').innerHTML = tags.map(t => `<span class="tag-chip">${t}</span>`).join('');
    
    const summary = data.cn_summary || data.summary || '';
    document.getElementById('dp-summary').textContent = summary;
    document.getElementById('dp-summary').style.display = summary ? 'block' : 'none';
    
    const insight = data.key_insight || '';
    document.getElementById('dp-insight').textContent = insight ? `馃挕 ${insight}` : '';
    document.getElementById('dp-insight').style.display = insight ? 'block' : 'none';
    
    document.getElementById('dp-link').href = data.link || '#';
    document.getElementById('detail-panel').classList.add('visible');
    closeCatInfo();
}

function closeDetail() {
    document.getElementById('detail-panel').classList.remove('visible');
}

// === FIX 7: Today section ===
function renderTodaySection() {
    const wrapper = document.getElementById('today-content');
    const todayArticles = allNodes.filter(n => n.data?.is_today && n.data?.type === 'article');
    
    if (todayArticles.length === 0) {
        wrapper.innerHTML = `
            <div class="today-section empty">
                <h3>馃搵 浠婃棩鍔ㄦ€?/h3>
                <div class="today-empty">鏆傛棤浠婃棩鏂板鎯呮姤</div>
            </div>
        `;
        return;
    }
    
    let html = `<div class="today-section">`;
    html += `<h3>馃敟 浠婃棩鏂板 ${todayArticles.length} 鏉?/h3>`;
    
    todayArticles.slice(0, 5).forEach(art => {
        const d = art.data;
        const badges = [];
        if (d.is_important_source) badges.push('<span class="ti-badge important">閲嶈鏉ユ簮</span>');
        if (d.is_major_news) badges.push('<span class="ti-badge major">閲嶅ぇ鏂伴椈</span>');
        
        html += `
            <div class="today-item" data-node-id="${art.id}">
                <div class="ti-title">${d.cn_title || d.label || '鏃犳爣棰?}</div>
                <div class="ti-meta">
                    <span>${CAT_CONFIG[d.category]?.name || d.category}</span>
                    ${badges.join('')}
                </div>
            </div>
        `;
    });
    
    if (todayArticles.length > 5) {
        html += `<div class="today-empty">杩樻湁 ${todayArticles.length - 5} 鏉?..</div>`;
    }
    
    // Add category summary text
    const summary = graphData.today_summary || {};
    const summaryTexts = [];
    for (const [cat, text] of Object.entries(summary)) {
        if (text && text.trim()) {
            summaryTexts.push(`<strong>${CAT_CONFIG[cat]?.name || cat}</strong>: ${text.trim()}`);
        }
    }
    if (summaryTexts.length > 0) {
        html += `<div class="today-summary-text">${summaryTexts.join('<br>')}</div>`;
    }
    
    html += `</div>`;
    wrapper.innerHTML = html;
    
    // Bind click events
    wrapper.querySelectorAll('.today-item').forEach(el => {
        el.addEventListener('click', () => {
            const nodeId = el.dataset.nodeId;
            const node = nodes.get(nodeId);
            if (node) {
                // Make sure article is visible
                nodes.update({ id: nodeId, hidden: false });
                handleNodeClick(node);
            }
        });
    });
}

function setupUI() {
    // Build category + tag list in sidebar
    const catList = document.getElementById('cat-list');
    
    Object.entries(CAT_CONFIG).forEach(([cat, cfg]) => {
        const catTags = allNodes.filter(n => n.data?.category === cat && n.data?.type === 'tag');
        const catArticles = allNodes.filter(n => n.data?.category === cat && n.data?.type === 'article');
        const todayCount = catArticles.filter(n => n.data?.is_today).length;
        
        const item = document.createElement('div');
        item.className = 'cat-item';
        item.dataset.cat = cat;
        
        const header = document.createElement('div');
        header.className = 'cat-header';
        header.innerHTML = `
            <div class="cat-dot" style="background:${cfg.color}"></div>
            <div class="cat-name">${cfg.emoji} ${cfg.name}</div>
            <div class="cat-count">${catTags.length}鏍囩${todayCount > 0 ? ` 路 <span style="color:#FF6B35">${todayCount}鏂?/span>` : ''}</div>
            <div class="cat-toggle">鈻?/div>
        `;
        header.addEventListener('click', (e) => {
            if (e.target.closest('.cat-toggle')) {
                toggleTagList(cat, item);
            } else {
                toggleCategory(cat, header);
            }
        });
        
        const tagList = document.createElement('div');
        tagList.className = 'tag-list';
        tagList.id = `taglist-${cat}`;
        
        catTags.forEach(tagNode => {
            const tagEl = document.createElement('div');
            tagEl.className = 'tag-item';
            tagEl.dataset.tagId = tagNode.id;
            tagEl.innerHTML = `
                <div class="tag-dot" style="background:${cfg.color};opacity:0.6"></div>
                <div class="tag-label">${tagNode.label}</div>
                <div class="tag-num">${tagNode.data?.count || 0}</div>
            `;
            tagEl.addEventListener('click', (e) => {
                e.stopPropagation();
                selectTag(tagNode.id);
                toggleTagArticles(tagNode.id);
            });
            tagList.appendChild(tagEl);
        });
        
        item.appendChild(header);
        item.appendChild(tagList);
        catList.appendChild(item);
    });
    
    // === FIX 3: Search with expanded fields ===
    document.getElementById('search-box').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        const statusEl = document.getElementById('search-status');
        
        if (!query) {
            statusEl.textContent = '';
            nodes.forEach(n => {
                if (n.data?.type === 'article') {
                    const parentTag = getParentTag(n.id);
                    nodes.update({ id: n.id, hidden: !expandedTags.has(parentTag) && !articlesVisible });
                } else {
                    nodes.update({ id: n.id, hidden: false });
                }
            });
            return;
        }
        
        let matchCount = 0;
        const firstMatch = null;
        const matchedIds = [];
        
        nodes.forEach(n => {
            const d = n.data || {};
            
            // Expanded search across all text fields
            const searchable = [
                n.label, d.title_en, d.cn_title, d.summary, d.cn_summary,
                d.key_insight, d.source
            ].filter(Boolean).join(' ').toLowerCase();
            
            const tagMatch = (d.tags || []).some(t => t.toLowerCase().includes(query));
            const match = searchable.includes(query) || tagMatch;
            
            if (d.type === 'category') {
                nodes.update({ id: n.id, hidden: false });
            } else if (match) {
                nodes.update({ id: n.id, hidden: false });
                matchCount++;
                matchedIds.push(n.id);
            } else {
                nodes.update({ id: n.id, hidden: true });
            }
        });
        
        statusEl.innerHTML = matchCount > 0 
            ? `鎵惧埌 <span class="match-count">${matchCount}</span> 涓尮閰嶇粨鏋渀
            : '鏈壘鍒板尮閰嶇粨鏋?;
        
        // Focus and highlight first match
        if (matchedIds.length > 0) {
            const firstId = matchedIds[0];
            const firstNode = nodes.get(firstId);
            if (firstNode) {
                if (firstNode.data?.type === 'tag') {
                    selectTag(firstId);
                } else if (firstNode.data?.type === 'article') {
                    selectArticle(firstId);
                } else {
                    network.focus(firstId, { scale: 1.3, animation: true });
                }
            }
        }
    });
    
    // Toggle articles
    document.getElementById('btn-toggle-articles').addEventListener('click', function() {
        articlesVisible = !articlesVisible;
        this.classList.toggle('active', articlesVisible);
        this.textContent = articlesVisible ? '馃搫 闅愯棌鏂囩珷鑺傜偣' : '馃搫 鏄剧ず鏂囩珷鑺傜偣';
        
        nodes.forEach(n => {
            if (n.data?.type === 'article') {
                if (articlesVisible) {
                    const cat = n.data?.category;
                    nodes.update({ id: n.id, hidden: !activeCategories.has(cat) });
                } else {
                    const parentTag = getParentTag(n.id);
                    nodes.update({ id: n.id, hidden: !expandedTags.has(parentTag) });
                }
            }
        });
    });
    
    // Physics toggle
    document.getElementById('btn-physics').addEventListener('click', function() {
        physicsEnabled = !physicsEnabled;
        this.classList.toggle('active', !physicsEnabled);
        this.textContent = physicsEnabled ? '鈴?鏆傚仠鐗╃悊' : '鈻?鎭㈠鐗╃悊';
        network.setOptions({ physics: { enabled: physicsEnabled } });
    });
    
    // Reset
    document.getElementById('btn-reset').addEventListener('click', () => {
        network.fit({ animation: { duration: 500 } });
        clearSelection();
    });
}

function toggleTagList(cat, item) {
    const tagList = item.querySelector('.tag-list');
    const toggle = item.querySelector('.cat-toggle');
    tagList.classList.toggle('open');
    toggle.classList.toggle('open');
}

function updateTagListUI() {
    // Update tag list to show which are expanded
    document.querySelectorAll('.tag-item').forEach(el => {
        const tagId = el.dataset.tagId;
        if (tagId) {
            if (expandedTags.has(tagId)) {
                el.style.opacity = '1';
            } else {
                el.style.opacity = '0.7';
            }
        }
    });
}

function getParentTag(articleId) {
    const edge = allEdges.find(e => 
        (e.from === articleId && e.to.startsWith('tag_')) ||
        (e.to === articleId && e.from.startsWith('tag_'))
    );
    if (edge) {
        return edge.from.startsWith('tag_') ? edge.from : edge.to;
    }
    return null;
}

function toggleCategory(cat, el) {
    if (activeCategories.has(cat)) {
        activeCategories.delete(cat);
        el.classList.add('inactive');
    } else {
        activeCategories.add(cat);
        el.classList.remove('inactive');
    }
    
    nodes.forEach(n => {
        const nodeCat = n.data?.category;
        if (nodeCat === cat) {
            if (n.data?.type === 'article') {
                const parentTag = getParentTag(n.id);
                const show = activeCategories.has(cat) && (articlesVisible || expandedTags.has(parentTag));
                nodes.update({ id: n.id, hidden: !show });
            } else {
                nodes.update({ id: n.id, hidden: !activeCategories.has(cat) });
            }
        }
    });
}

init();
</script>
</body>
