<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/dist/vis-network.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>body{background:#0A1F3B;color:white;margin:0}#mynetwork{width:100vw;height:100vh}</style>
</head>
<body>
    <div id="mynetwork"></div>
    <div id="status" style="position:fixed;top:10px;left:10px;background:red;padding:10px;z-index:999">Loading...</div>
<script>
    try {
        const nodes = new vis.DataSet([
            {id: 1, label: 'Node 1', color: '#FF6B35', shape: 'dot', size: 30},
            {id: 2, label: 'Node 2', color: '#4A7BC3', shape: 'dot', size: 20},
            {id: 3, label: 'Node 3', color: '#E6B85C', shape: 'dot', size: 10}
        ]);
        const edges = new vis.DataSet([
            {from: 1, to: 2, arrows: 'to'},
            {from: 2, to: 3, arrows: 'to'}
        ]);
        const container = document.getElementById('mynetwork');
        const network = new vis.Network(container, {nodes, edges}, {
            physics: {forceAtlas2Based: {gravitationalConstant: -50, springLength: 100}, solver: 'forceAtlas2Based'}
        });
        document.getElementById('status').textContent = 'OK! vis-network 9.1.2 works';
        document.getElementById('status').style.background = 'green';
    } catch(e) {
        document.getElementById('status').textContent = 'ERROR: ' + e.message;
    }
</script>
</body>
</html>
