name: Auto Update Knowledge Graph

on:
  schedule:
    - cron: '0 22 * * *'  # UTC 22:00 = 北京时间早6点
  workflow_dispatch:  # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout knowledge-graph
        uses: actions/checkout@v4

      - name: Checkout rss-news-aggregator data
        uses: actions/checkout@v4
        with:
          repository: napchang/rss-news-aggregator
          path: rss-data

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update knowledge base
        run: python scripts/update_kb.py

      - name: Generate graph data
        run: python scripts/gen_graph_data.py

      - name: Generate today graph
        run: python scripts/gen_today_graph.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add graph-data.json today-graph-data.json geo-knowledge-base/
          git diff --cached --quiet || (
            git commit -m "auto: update graph $(date +%F)" &&
            git push
          )
