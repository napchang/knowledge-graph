name: Auto Update Knowledge Graph

on:
  schedule:
    - cron: '0 22 * * *'  # UTC 22:00 = 鍖椾含鏃堕棿鏃?鐐?
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout knowledge-graph
        uses: actions/checkout@v4

      - name: Checkout rss-news-aggregator data
        uses: actions/checkout@v4
        with:
          repository: napchang/rss-news-aggregator
          path: rss-data
          token: ${{ secrets.RSS_REPO_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Update knowledge base
        run: python scripts/update_kb.py

      - name: Clean mismatch cache
        run: python scripts/clean_mismatch_cache.py

      - name: Enrich articles (generate Chinese content)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/enrich_articles.py

      - name: Generate graph data
        run: python scripts/gen_graph_data.py

      - name: Generate today graph
        run: python scripts/gen_today_graph.py

      - name: Validate graph data
        run: python scripts/validate_graph.py

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add graph-data.json today-graph-data.json geo-knowledge-base/ article_enrich_cache.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "auto: update graph $(date +%F)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Get update stats
        if: steps.commit.outputs.changed == 'true'
        id: stats
        run: |
          TODAY_NODES=$(python -c "import json; d=json.load(open('today-graph-data.json')); print(len([n for n in d.get('nodes',[]) if n.get('type')=='article']))")
          TOTAL_NODES=$(python -c "import json; d=json.load(open('graph-data.json')); print(len(d.get('nodes',[])))")
          TODAY_STR=$(python -c "import json; d=json.load(open('today-graph-data.json')); print(d.get('date',''))")
          echo "today_articles=$TODAY_NODES" >> $GITHUB_OUTPUT
          echo "total_nodes=$TOTAL_NODES" >> $GITHUB_OUTPUT
          echo "today_str=$TODAY_STR" >> $GITHUB_OUTPUT

      - name: Notify Feishu on success
        if: steps.commit.outputs.changed == 'true' && env.FEISHU_WEBHOOK_URL != ''
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TODAY_ARTICLES: ${{ steps.stats.outputs.today_articles }}
          TOTAL_NODES: ${{ steps.stats.outputs.total_nodes }}
          TODAY_STR: ${{ steps.stats.outputs.today_str }}
        run: |
          python3 -c "
          import json, urllib.request, os
          url = os.environ['FEISHU_WEBHOOK_URL']
          data = {
            'msg_type': 'interactive',
            'card': {
              'header': {
                'title': {'tag': 'plain_text', 'content': '✅ 知识图谱更新成功'},
                'template': 'green'
              },
              'elements': [
                {
                  'tag': 'div',
                  'text': {
                    'tag': 'lark_md',
                    'content': f'**采集日期：**{os.environ.get(\"TODAY_STR\",\"\")}\n**今日新增文章：**{os.environ.get(\"TODAY_ARTICLES\",\"\")} 篇\n**图谱总节点：**{os.environ.get(\"TOTAL_NODES\",\"\")} 个\n**更新链接：**[点击查看](https://napchang.github.io/knowledge-graph/)'
                  }
                }
              ]
            }
          }
          req = urllib.request.Request(url, data=json.dumps(data).encode('utf-8'), headers={'Content-Type': 'application/json'})
          resp = urllib.request.urlopen(req)
          print('Feishu notify status:', resp.status)
          "

      - name: Notify Feishu on failure
        if: failure()
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then
            echo "FEISHU_WEBHOOK_URL not configured, skipping notification"
            exit 0
          fi
          python3 -c "
          import json, urllib.request, os
          url = os.environ['FEISHU_WEBHOOK_URL']
          data = {
            'msg_type': 'interactive',
            'card': {
              'header': {
                'title': {'tag': 'plain_text', 'content': '❌ 知识图谱更新失败'},
                'template': 'red'
              },
              'elements': [
                {
                  'tag': 'div',
                  'text': {
                    'tag': 'lark_md',
                    'content': '请检查 GitHub Actions 日志排查问题\n**工作流链接：**[点击查看](https://github.com/napchang/knowledge-graph/actions)'
                  }
                }
              ]
            }
          }
          req = urllib.request.Request(url, data=json.dumps(data).encode('utf-8'), headers={'Content-Type': 'application/json'})
          resp = urllib.request.urlopen(req)
          print('Feishu notify status:', resp.status)
          "
